packages:
  - "packages/*"
  - "shared"
  - "examples/web/*"
  - "examples/web/*/*"
  - "examples/web/*/*/*" # subgroups (e.g. examples/web/react/animation-examples/)
  - "examples/desktop/*/*"
  - "examples/console/*"
  - "benchmarks"
peerDependencyRules:
  allowedVersions:
    typescript: '6'
overrides:
  '@types/node': $@types/node
  # Bound to <8: vite-plugin-solid (solid adapter) breaks on @babel/core 8 / vite 8
  # (both released 2026-06). The previous open upper bounds let `pnpm dedupe` (the
  # pre-commit hook auto-dedupes) pull 8 and kill the solid bundle. Lift both when
  # vite-plugin-solid supports 8. (vite's bound is tightened at its existing entry.)
  '@babel/core': '>=7.29.6 <8'
  # TEMPORARY (2026-07-11): typescript-eslint UNPUBLISHED 8.63.0 from the registry
  # (latest is 8.62.1 again) after the 07-10 Dependabot bump had already resolved
  # eslint-plugin-import-x's peer to 8.63.0 — every install/dedupe then dies with
  # NO_MATCHING_VERSION on @typescript-eslint/visitor-keys@8.63.0. Pin the trio to
  # the published 8.62.0 (matching the root's exact `typescript-eslint` pin).
  # REMOVE on the next typescript-eslint bump (a re-published >=8.63 makes this pin
  # a stale downgrade that will fight Dependabot).
  '@typescript-eslint/project-service': 8.62.0
  '@typescript-eslint/scope-manager': 8.62.0
  '@typescript-eslint/tsconfig-utils': 8.62.0
  '@typescript-eslint/types': 8.62.0
  '@typescript-eslint/typescript-estree': 8.62.0
  '@typescript-eslint/utils': 8.62.0
  '@typescript-eslint/visitor-keys': 8.62.0
  '@isaacs/brace-expansion': 5.0.1
  axios: '>=1.16.0'
  follow-redirects: '>=1.16.0'
  qs: '>=6.14.2'
  # Force adm-zip past the path-traversal fix (GHSA-xcpc-8h2w-3j85, High). Its only consumer is
  # @sonar/scan (root devDep, NOT shipped), which pins adm-zip EXACTLY at 0.5.17 in both 4.3.8 and
  # the latest 4.4.0 — so an override is the only bump path. Dev-only + trusted-input (the scanner
  # extracts SonarSource's own zip), so 0.6.0's stricter extract can't break it. Drop when a
  # @sonar/scan release moves off 0.5.x. (Override, not an osv-scanner.toml allowlist, so a future
  # regression that drops it re-fails the gate instead of being silently masked.)
  adm-zip: '>=0.6.0'
  rollup: 4.62.0
  minimatch@3: ~3.1.4
  minimatch@9: ~9.0.7
  minimatch@10: ~10.2.3
  ajv@6: ~6.14.0
  ajv@8: ~8.18.0
  underscore: '>=1.13.8'
  http-proxy-agent: 7.0.2
  undici: '>=7.28.0 <8.0.0'
  piscina: '>=5.2.0 <6.0.0'
  flatted: '>=3.4.2'
  path-to-regexp: '>=8.4.0'
  # ReDoS in brace-expansion (GHSA-3jxr-9vmj-r5cp, High). All three major lines are in the tree
  # via assorted dev/tooling deps — pin each to its patched release. EXACT (not '>=') because the
  # '@N' selector value can't be an open range without risking a cross-major jump (a '>=1.1.16' on
  # the @1-selected dep could resolve up to 5.x). Bump each line when its next patch lands.
  brace-expansion@1: 1.1.16
  brace-expansion@2: 2.1.2
  brace-expansion@5: 5.0.7
  # shell-quote < 1.9.0 (GHSA-395f-4hp3-45gv, High) — dev-only (concurrently → shell-quote), never
  # in a published @real-router/* package. Drop when concurrently pulls >=1.9.0 transitively.
  shell-quote: '>=1.9.0'
  # body-parser < 2.3.0 (GHSA-v422-hmwv-36x6, Low) — example-only (express@5), not shipped. Drop
  # when express pulls >=2.3.0.
  body-parser: '>=2.3.0'
  node-forge: '>=1.4.0'
  picomatch@2: 2.3.2
  picomatch@4: 4.0.4
  yaml@1: 1.10.3
  yaml@2: 2.8.3
  smol-toml: '>=1.6.1'
  defu: '>=6.1.5'
  devalue: '>=5.8.1'
  esbuild: '>=0.28.1'
  vite: '>=7.3.5 <8'
  fast-uri: '>=3.1.2'
  hono: '>=4.12.21'
  ip-address: '>=10.1.1'
  js-cookie: '>=3.0.7'
  tmp: '>=0.2.6'
  fflate: 0.8.2
  read-yaml-file: '>=2.1.0 <3.0.0'
# --- pnpm settings (migrated from .npmrc during the pnpm 11 upgrade) ---
updateNotifier: false
saveExact: true
gitTagVersion: true
loglevel: error
# Strict mode for early peer-deps detection
autoInstallPeers: true
strictPeerDependencies: true
# Security: strict build-script verification (default in pnpm 11; kept explicit)
strictDepBuilds: true
# Auto-cleanup unused catalog entries
cleanupUnusedCatalogs: true
scriptShell: bash
# Supply-chain quarantine opt-out. Every dependency here is dev/build tooling,
# and UI frameworks at the adapters are peerDependencies (installed by the
# consumer) — nothing from these deps ships to users at runtime, so the 24h
# new-version quarantine adds no user-facing protection, while it WOULD block
# Dependabot security PRs (ERR_PNPM_NO_MATURE_MATCHING_VERSION). Protection is
# exact-pinning + deliberate bumps + PR review.
# NB: any explicit minimumReleaseAge auto-enables minimumReleaseAgeStrict; at 0
# the gate is a no-op, but if this is ever raised, also set minimumReleaseAgeStrict.
minimumReleaseAge: 0
allowBuilds:
  '@parcel/watcher': true
  core-js: true
  electron: true
  esbuild: true
  fsevents: true
  lmdb: true
  msgpackr-extract: true
  unrs-resolver: true
  vue-demi: true
  electron-winstaller: false
