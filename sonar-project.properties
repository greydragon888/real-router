# SonarCloud Configuration
sonar.organization=oleg-ivanov
sonar.projectKey=greydragon888_real-router

# Project Information
sonar.projectName=real-router
# sonar.projectVersion is set dynamically in CI from packages/core/package.json
# (the `Get version from core package` step in .github/workflows/ci.yml) and
# passed as a -D arg, which overrides this file. Omitted here so a stale literal
# can't mislead local `pnpm sonar` runs (#735).

# Source Code, tests, and coverage report paths are generated dynamically in CI
# from the filesystem (the `Compute Sonar scope` step in .github/workflows/ci.yml)
# and passed as scanner `-D` args, which override this file. They were previously
# hardcoded here and drifted out of sync with the package set (#732). Do NOT
# re-add static sonar.sources / sonar.tests / sonar.javascript.lcov.reportPaths.

# Coverage exclusions — files whose coverage Sonar must not score.
# `**/types/**` mirrors the same exclusion in vitest coverage (vitest-excluded
# files have no lcov records → Sonar would score them 0%). The trailing
# packages/*/src/** entries exclude code that legitimately lacks a clean lcov,
# so the new-code-coverage gate can't red on it (#732):
#   - angular/solid/svelte/vue: compiler-phantom code → lowered vitest thresholds
#     (coverage stays enforced by vitest + visible in Codecov)
# `shared/**` is NOT excluded (#809): each shared dir is measured at 100% by an
# owner package (shared/browser-env → browser-env, shared/dom-utils → dom-utils,
# shared/ssr → ssr-data-plugin) via coverage.allowExternal + a shared/<dir>
# include in the owner's vitest.config.mts. The owners' lcov SF paths are
# normalized to repo-root-relative shared/<dir>/… by the CI "Fix coverage paths"
# step, so Sonar scores shared sources at their real location.
# scripts/check-coverage-scope.mjs asserts these stay in sync with the package set.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**,**/*.config.ts,**/*.config.mts,**/*.config.js,**/index.ts,**/constants.ts,**/types.ts,**/types/**,**/enums.ts,**/interfaces.ts,**/contexts.ts,packages/angular/src/**,packages/solid/src/**,packages/svelte/src/**,packages/vue/src/**

# Exclusions (analysis scope - exclude non-production code)
# packages/angular/src/dom-utils is a git-tracked COPY of shared/dom-utils
# (re-materialized by prebundle; ng-packagr can't follow symlinks) — shared/
# is analysed directly, so the copy is excluded to avoid analysing/CPD-matching
# the same code twice.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js,**/.vitest/**,**/*.config.ts,**/*.config.mts,**/*.config.js,**/benchmarks/**,**/scripts/**,.env,**/*.bench.ts,packages/angular/src/dom-utils/**

# Test exclusions — exclude ALL test code from analysis. `sonar.tests` is set in
# CI to `packages/*/tests` (the `Compute Sonar scope` step), so those files land
# in Sonar's test source set and get test-specific rules (e.g. S2699 "assertion
# always succeeds/fails", S5863) raised as Code Smells. Tests are not production
# code — exclude the whole test set so Sonar never analyses or scores it. Coverage
# is unaffected (it comes from the lcov reportPaths, not the test source set; tests
# are already coverage-excluded above and CPD-excluded below).
sonar.test.exclusions=**/tests/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.stress.ts,**/*.properties.ts,**/*.bench.ts,**/benchmarks/**

# Duplications — align with jscpd's parallel-structure ignores (.jscpd.json).
# preact/src is a deliberate React-compat mirror and hash-plugin/src mirrors
# browser-plugin; jscpd excludes both from the repo's own duplication gate, so
# Sonar CPD does too — otherwise lines added symmetrically to a package and its
# mirror (e.g. the announceNavigation options wiring added to both react + preact
# RouterProvider.tsx in #1065, 16 lines each) trip the new-code duplication gate.
# Tests are intentionally parallel across adapters (already excluded above too).
# The type-guards dissolution twins (#1520) are deliberate copies BY DESIGN:
# the former internal type-guards package was dissolved by DISTRIBUTION — each
# consumer inlines exactly the guards it uses (validation-plugin's
# src/type-guards/** and shared/browser-env's state-guard.ts), with no shared
# runtime dependency on purpose. The copies necessarily CPD-match each other
# (jscpd's own gate never saw the pair: its glob covers packages/*/src only,
# not shared/), so both sides are excluded here like the other mirrors.
sonar.cpd.exclusions=**/tests/**,packages/preact/src/**,packages/hash-plugin/src/**,packages/react/src/legacy.ts,packages/react/src/legacy.ssr.ts,packages/react/src/ink.ts,packages/*/src/**/*.react-server.ts,packages/validation-plugin/src/type-guards/**,shared/browser-env/state-guard.ts

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Code Quality
sonar.qualitygate.wait=true
