# SonarCloud Configuration
sonar.organization=oleg-ivanov
sonar.projectKey=greydragon888_real-router

# Project Information
sonar.projectName=real-router
sonar.projectVersion=0.1.0

# Source Code, tests, and coverage report paths are generated dynamically in CI
# from the filesystem (the `Compute Sonar scope` step in .github/workflows/ci.yml)
# and passed as scanner `-D` args, which override this file. They were previously
# hardcoded here and drifted out of sync with the package set (#732). Do NOT
# re-add static sonar.sources / sonar.tests / sonar.javascript.lcov.reportPaths.

# Coverage exclusions — files whose coverage Sonar must not score.
# `**/types/**` mirrors the same exclusion in vitest coverage (vitest-excluded
# files have no lcov records → Sonar would score them 0%). The trailing
# packages/*/src/** entries exclude code that legitimately lacks a clean lcov,
# so the new-code-coverage gate can't red on it (#732):
#   - angular/solid/svelte/vue: compiler-phantom code → lowered vitest thresholds
#     (coverage stays enforced by vitest + visible in Codecov)
#   - core-types: no tests/ → produces no lcov (would otherwise be scored 0%)
# `shared/**` is NOT excluded (#809): each shared dir is measured at 100% by an
# owner package (shared/browser-env → browser-env, shared/dom-utils → dom-utils,
# shared/ssr → ssr-data-plugin) via coverage.allowExternal + a shared/<dir>
# include in the owner's vitest.config.mts. The owners' lcov SF paths are
# normalized to repo-root-relative shared/<dir>/… by the CI "Fix coverage paths"
# step, so Sonar scores shared sources at their real location.
# scripts/check-coverage-scope.mjs asserts these stay in sync with the package set.
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**,**/*.config.ts,**/*.config.mts,**/*.config.js,**/index.ts,**/constants.ts,**/types.ts,**/types/**,**/enums.ts,**/interfaces.ts,**/contexts.ts,packages/angular/src/**,packages/solid/src/**,packages/svelte/src/**,packages/vue/src/**,packages/core-types/src/**

# Exclusions (analysis scope - exclude non-production code)
# packages/angular/src/dom-utils is a git-tracked COPY of shared/dom-utils
# (re-materialized by prebundle; ng-packagr can't follow symlinks) — shared/
# is analysed directly, so the copy is excluded to avoid analysing/CPD-matching
# the same code twice.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js,**/.vitest/**,**/*.config.ts,**/*.config.mts,**/*.config.js,**/benchmarks/**,**/scripts/**,.env,**/*.bench.ts,packages/angular/src/dom-utils/**

# Test exclusions (exclude benchmark files from test analysis)
sonar.test.exclusions=**/*.bench.ts,**/benchmarks/**

# Duplications
sonar.cpd.exclusions=**/tests/**

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Code Quality
sonar.qualitygate.wait=true
