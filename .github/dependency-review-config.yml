# Allow-list of acceptable licenses (deny-licenses is deprecated)
# Excludes strong copyleft licenses (AGPL) that would require open-sourcing derivative works
# GPL/LGPL are allowed for devDependencies (build tools) as they don't link with production code
# Current GPL devDependencies: rollup-plugin-dts (Solid adapter DTS bundling)
allow-licenses:
  - MIT
  - MIT-0
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - 0BSD
  - Unlicense
  - CC0-1.0
  - CC-BY-4.0
  - BlueOak-1.0.0
  - Python-2.0
  - LGPL-3.0-only
  - GPL-3.0-only
  - GPL-3.0-or-later

# Transitive devDeps with SPDX strings the allow-list doesn't disambiguate but
# that are de-facto permissive. All four are vendored by jsdom / Playwright /
# pnpm tooling and have been present in pnpm-lock.yaml since before the Ink
# entry PR — the action only surfaces them now because the dependency graph
# shifted. Exempted by name (any version) for future-proofing.
allow-dependencies-licenses:
  # "JSON AND MIT" — JSON license (harmless, dual-listed with MIT).
  - pkg:npm/parse-statements
  # "WTFPL OR (MIT AND WTFPL)" — effectively MIT under the OR branch.
  - pkg:npm/spark-md5
  # "CC-BY-3.0" — documentation-style license; this package is a list of SPDX
  #              exception identifiers, used by SPDX validators.
  - pkg:npm/spdx-exceptions
  # "BSD-2-Clause AND BSD-2-Clause-Views" — AND variant the parser doesn't match.
  - pkg:npm/uri-js
