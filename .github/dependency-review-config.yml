# Allow-list of acceptable licenses (deny-licenses is deprecated)
# Excludes strong copyleft licenses (GPL, AGPL) that would require open-sourcing derivative works
# LGPL is allowed for devDependencies (linters, build tools) as they don't link with production code
allow-licenses:
  - MIT
  - MIT-0
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - ISC
  - 0BSD
  - Unlicense
  - CC0-1.0
  - CC-BY-4.0
  - BlueOak-1.0.0
  - Python-2.0
  - LGPL-3.0-only

# Allow Express 5 transitive dependencies with low OpenSSF Scorecard
# These are well-established, single-purpose packages maintained by Express team
# Used only in examples/ssr-react (private, not published)
allow-packages:
  - pkg:npm/unpipe
  - pkg:npm/toidentifier
  - pkg:npm/escape-html
  - pkg:npm/ee-first
  - pkg:npm/depd
  - pkg:npm/cookie-signature
