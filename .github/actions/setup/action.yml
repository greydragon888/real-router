name: Setup
description: Shared CI setup — pnpm, Node 24, and a pnpm install. Centralises the
  block repeated across every build job so the Node version / cache / install
  flags live in one place. The caller must run actions/checkout first (a local
  composite action needs the repo present to be resolved).
inputs:
  install-args:
    description: Arguments passed to `pnpm install` (e.g. `--frozen-lockfile --ignore-scripts`).
    required: false
    default: "--frozen-lockfile"
  node-cache:
    description:
      Value for actions/setup-node's `cache` input. Default "pnpm" restores the
      pnpm store from GitHub's cache backend — right for ephemeral GitHub-hosted
      runners. Pass "" to skip the restore/save entirely on persistent
      self-hosted runners, where the local store + node_modules survive between
      runs and the ~200 MB tarball download is pure network overhead
      (codspeed.yml does this).
    required: false
    default: "pnpm"
runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: ${{ inputs.node-cache }}

    - name: Install dependencies
      shell: bash
      # Unquoted on purpose: install-args may carry multiple flags that must
      # word-split (e.g. `--frozen-lockfile --ignore-scripts`).
      run: pnpm install ${{ inputs.install-args }}
