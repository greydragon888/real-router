version: 2
updates:
  # Root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    groups:
      # Group all development dependencies
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
      # Group ESLint and related packages
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "*eslint*"
      # Group TypeScript related packages
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsdown"
      # Group testing libraries
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
      # Group Turbo related
      turbo:
        patterns:
          - "turbo"
          - "eslint-config-turbo"
    reviewers:
      - "greydragon888"
    assignees:
      - "greydragon888"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    ignore:
      # Transitive deps whose OSV/GHSA advisories are already resolved by a pnpm
      # `overrides` entry in pnpm-workspace.yaml (verified clean by `lint:audit` /
      # osv-scanner). Dependabot does NOT apply pnpm overrides during resolution,
      # so it re-resolves these to their natural transitive ceiling (e.g. undici
      # 7.27.2 < fixed 7.28.0), decides it "cannot update X to a non-vulnerable
      # version", and ERRORS THE ENTIRE npm job — producing zero PRs. Repeated
      # errors then auto-halt Dependabot for the whole repo. These are pure
      # transitive deps (no direct import), fully managed via overrides, so
      # Dependabot can never PR them anyway — ignore them here.
      #
      # PATTERN: whenever a transitive-dep advisory is fixed via a pnpm override
      # in pnpm-workspace.yaml, add the dep here too, or Dependabot will re-halt.
      - dependency-name: "undici" # override: undici '>=7.28.0 <8.0.0' (GHSA fixed 7.28.0)
      - dependency-name: "piscina" # override: piscina '>=5.2.0 <6.0.0'
      - dependency-name: "js-yaml" # override: read-yaml-file '>=2.1.0' (GHSA-h67p-54hq-rp68)
      # @types/node is pinned to the Node.js runtime major (Node 24 — see the
      # CLAUDE.md toolchain table + CI `node-version: 24`). Block semver-major:
      # type defs ahead of the runtime let TS resolve Node APIs that don't exist
      # at runtime (compiles, then fails on Node 24). 24.x patch/minor still flow.
      # Lift this when the project moves to a newer Node major.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # typescript is pinned to the current major (6.x) until the type-tooling
      # ecosystem supports the next one. typescript-eslint and ts-morph lag each
      # TS major (TS 7 is unsupported by them today), so bumping TS ahead of them
      # breaks `pnpm lint` + type-tooling repo-wide — at most a split toolchain is
      # viable. Block the major only; 6.x patch/minor keep flowing. Lift this when
      # typescript-eslint + ts-morph declare support for the next TS major, then
      # bump TS manually.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # nanostores state-lib set — benchmark-only (benchmarks/package.json), used to
      # compare state libraries. The @nanostores/* adapters are version-COUPLED to
      # `nanostores` via strict peer ranges (@nanostores/react@0.8.x peers nanostores
      # ^0.9||^0.10||^0.11; @1.x peers ^1.2). Dependabot bumps each dep INDIVIDUALLY,
      # which breaks the other's peer range → with `strictPeerDependencies: true`
      # (pnpm-workspace.yaml) the `pnpm install --lockfile-only` re-resolve fails
      # (ERR_PNPM_PEER_DEP_ISSUES) and ERRORS THE ENTIRE npm job (observed: run
      # 28643677860, "3 error(s)"), risking a repo-wide Dependabot halt — same class
      # as the transitive block above. Pinned to the libs' recommended pairing; bump
      # the set manually + together if a benchmark refresh needs it.
      - dependency-name: "nanostores"
      - dependency-name: "@nanostores/*"
      # vite is a direct dev-dep across 127 example workspaces (all pinned 7.3.6),
      # so Dependabot bumps it INDIVIDUALLY ahead of its ecosystem. On a new MAJOR
      # (vite 8) the whole plugin/test stack still peers `vite >=7.3.5 <8` —
      # vitest@4.1.x + @vitest/mocker, vite-plugin-solid, @sveltejs/vite-plugin-svelte,
      # @analogjs/vite-plugin-angular, vite-tsconfig-paths, @testing-library/svelte,
      # vitefu — so the `pnpm install --lockfile-only` re-resolve fails with
      # ERR_PNPM_PEER_DEP_ISSUES (strictPeerDependencies: true) and ERRORS THE ENTIRE
      # npm job (observed: run 28767218145, vite 8.1.3), risking a repo-wide halt —
      # same coupled-peer class as nanostores above. Block the major only; 7.x
      # patch/minor keep flowing. Lift this when vitest peers vite 8, then bump the
      # vite major manually + together across the ecosystem.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # --- Patch-float set: UI frameworks, 3rd-party routers, testing libs ------
      # Dev/test/example-only deps (never shipped — published adapters expose them
      # as peerDependency ranges). Declared with `~` patch-float ranges in every
      # manifest + a syncpack semverGroup (syncpack.config.mjs). `pnpm update`
      # pulls the latest patch; Dependabot stays quiet on PATCH so it stops the
      # per-patch PR churn these spread across ~150 example/adapter/benchmark
      # manifests (e.g. the @angular/ssr #1368 / @angular/router #1371 noise).
      # MINOR/major still flow as PRs (reviewed). Add new UI-framework/router/
      # testing deps here (and to the syncpack group) when introduced.
      - dependency-name: "react"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "preact"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "preact-render-to-string"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "solid-js"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "svelte"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "vue"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "react-router"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "wouter"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "sv-router"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@mateothegreat/svelte5-router"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@testing-library/*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@tanstack/*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@solidjs/*"
        update-types: ["version-update:semver-patch"]
      # @angular/* — EXACT cross-peer coupling (router@x requires core@x exactly),
      # so ANY single-package bump (patch/minor/major) breaks strictPeerDependencies
      # and can halt the whole npm job (same coupled-peer class as nanostores/vite
      # above). The framework only moves via a manual, coordinated `pnpm update`
      # across all @angular/* at once; the `~22.0.x` ranges then absorb the patch.
      # Ignore the namespace entirely (this replaced the `@angular/router` override).
      - dependency-name: "@angular/*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    reviewers:
      - "greydragon888"
    assignees:
      - "greydragon888"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
      - "automated"
