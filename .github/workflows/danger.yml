name: Danger

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  danger:
    name: Danger JS
    runs-on: ubuntu-latest
    # Skip draft PRs and changesets release PRs (the latter only bump
    # versions/changelogs). Gate by head-ref, NOT paths-ignore: the old
    # `paths-ignore: **/package.json` skipped the workflow on ANY package.json-only
    # PR — including the exact case `checkLockfileSync` exists to catch (a deps
    # bump that forgot `pnpm install`), so that check could never fire (#810
    # audit 1.5). The release branch is `changeset-release/*` (same as ci.yml).
    if: >-
      github.event.pull_request.draft == false &&
      !startsWith(github.head_ref, 'changeset-release/')
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Danger
        run: pnpm danger ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
