name: Cross Routers Benchmarks

# Scheduled snapshot of the cross-router Playwright + CDP benchmark matrix (5 cohorts ×
# 12 scenarios) → Pages dashboard + step-summary + artifact. GHA runners are shared/noisy,
# so this is an HONEST SNAPSHOT with RME annotation, NOT a regression gate. Action majors
# pinned to the current majors (checkout v7 · upload-artifact v7 · download-artifact v8 · pages v5).

on:
  schedule:
    - cron: "0 21 * * 0" # Mon 00:00 Moscow time (MSK = UTC+3, no DST → Sun 21:00 UTC), weekly
  workflow_dispatch:
    inputs:
      runs:
        description: "base samples per scenario (weekly default 100, min 10)"
        default: "100"

permissions:
  contents: read

concurrency:
  group: cross-router-bench
  cancel-in-progress: false

env:
  TURBO_API: ${{ vars.TURBO_API }} # Remote Cache → bundle ≈ cache-HIT (falls back to full bundle if unavailable)
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  bench:
    # Unsharded: ONE job runs all 5 cohorts (as per-cohort node processes — see the matrix
    # step) — coherent snapshot, one honest machine stamp (same VPS → identical env stamp).
    runs-on: self-hosted # the dedicated consistent VPS (same runner as codspeed/examples) — low-variance hardware, so the rme-gate can arm (CONSISTENT_RUNNER=1 below). schedule/workflow_dispatch only (no fork-PR) → no self-hosted RCE surface.
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup # pnpm + Node 24 + pnpm install --frozen-lockfile
        with:
          node-cache: "" # persistent self-hosted store survives between runs → skip the ~200 MB cache tarball (as codspeed.yml/codspeed-adapters.yml)

      # spec-parity preflight — ~2 s static scan, fail-fast BEFORE the ~2.8h build+matrix.
      # A drifted sweep constant silently drops an @N point per cohort (jagged snapshot); catch it in seconds.
      - name: Spec-parity preflight
        run: pnpm lint:bench-apps

      # the harness measures PRODUCTION dist (vite resolves @real-router/* → packages/*/dist/esm).
      # Remote Cache restore writes FRESH mtime → the provenance freshness gate does not false-fire (verified 07-18).
      - name: Build packages to dist
        run: pnpm turbo run bundle --filter='./packages/*'

      # playwright@1.61.1 has NO install script → browsers don't arrive with `pnpm install` (by design);
      # `pnpm exec` resolves playwright only inside benchmarks/ (its dep) → working-directory. On the persistent
      # self-hosted store (node-cache:"") the pinned Chromium survives between runs, so this is a fast no-op AFTER the
      # one-time VPS pre-install. NO --with-deps: this VPS's network DPI-throttles the Playwright CDN (examples.yml keeps
      # Playwright on ubuntu-latest for the same reason) and the gh-runner user has no passwordless sudo — so the browser
      # revision + system libs are provisioned out-of-band ONCE (re-seed on a playwright bump).
      - name: Install Chromium (expects the one-time VPS pre-install)
        run: pnpm exec playwright install chromium
        working-directory: benchmarks

      # matcher-bench/results.json is gitignored → it is deck-extract's input and absent on a fresh checkout.
      # Regenerate it (pure Node; after bundle so engines load from dist). µs absolutes are noisier on a shared VM,
      # but the O(1)-vs-O(N) matcher-curve SHAPE is hardware-invariant.
      - name: Isolated matcher microbench
        run: node --expose-gc cross-router/matcher-bench/run.mjs
        working-directory: benchmarks

      # Completeness gate: all cohorts (angular last), interleaved. Exit code IS the gate —
      # any real failure (broken adapter / contaminated run) → exit 1 → red job = "0 failed cells" failed.
      - name: Run the full matrix
        id: matrix
        # Per-cohort PROCESSES (one node per cohort) instead of one process for all five.
        # Cohorts are INDEPENDENT comparisons (react = real-router vs tanstack/react-router;
        # svelte = real-router vs sv-router/mateo-router; …) — their numbers are never
        # cross-compared, so splitting on the cohort boundary loses nothing methodological.
        # The engine INTERLEAVE that DOES matter (round-robin in one browser session, #1460)
        # lives entirely inside a single run-all invocation and is untouched. The split caps
        # peak RSS at ONE cohort (~2–3 GB) instead of the ~10.6 GB the all-in-one process
        # accreted over ~2.9 h of vite builds — the fattest victim the global OOM-killer picked
        # on 07-21 (OOM triggered by a co-tenant on this shared 11 GB VPS → runner unit killed →
        # red at the angular finish, run 29852814520). It also removes the memory-pressure
        # (GC pauses / swap) the LAST cohort measured under in the fat single process.
        # Provenance is identical across processes on the same machine (commit/cpu/runner/
        # dirty/distMtime) and env.date was already per-cell → deck-data unaffected. Any cohort
        # failing → rc=1 → red job (run-all's own completeness exit code) while the remaining
        # cohorts still run, for a full-as-possible snapshot in the log.
        run: |
          rc=0
          for cohort in react vue solid svelte angular; do
            echo "::group::cohort ${cohort}"
            node cross-router/run-all.mjs "$RUNS" "${cohort}" || rc=1
            echo "::endgroup::"
          done
          exit $rc
        working-directory: benchmarks
        timeout-minutes: 600 # covers all five cohorts in the loop; self-hosted has NO platform cap → this timeout is the SOLE hang backstop (per-cohort heaps make OOM far less likely now)
        env:
          BENCH_RUNNER: "self-hosted" # machine stamp (env.cpu carries the real CPU model)
          RUNS: ${{ inputs.runs || '100' }} # via env, not inline in `run:` — a workflow_dispatch input spliced into a run-script is a shell-injection sink (matches the rme-gate step below)

      # ── TRANSACTIONAL publish: deck / PDF / upload run ONLY after a fully-green matrix. They use
      #    default step gating (no `if:`) — any prior failure skips them and the job goes red, so a
      #    failed/partial run publishes NOTHING and the previous Pages deploy stays live. (This
      #    replaces the old salvage cascade that shipped partial snapshots "in any case".) A failed
      #    scheduled run also opens a tracking issue — see the notify-failure job. ──

      # rebuild the deck from THIS run in the workspace (META stamp header + disclaimer).
      # build-deck writes the gitignored deck.html + print.html (PDF edition source) + deck-data.json;
      # the tracked source (deck-shell.html + print-shell.html + deck-config.js + deck-render.js) is
      # read-only — build-deck never mutates it.
      - name: Rebuild deck snapshot
        id: deck
        run: node cross-router/deck/deck-extract.mjs && node cross-router/deck/build-deck.mjs
        working-directory: benchmarks

      # render the print/PDF edition (deck/print.html) → cross-router-report.pdf via Playwright's
      # Chromium page.pdf (the same browser the matrix already drives). Non-fatal: a PDF failure
      # degrades to "deck without a PDF link" — it must not red the run or block the deck publish.
      - name: Render PDF report
        id: pdf
        if: ${{ !cancelled() && steps.deck.outcome == 'success' }}
        continue-on-error: true
        run: node cross-router/deck/render-pdf.mjs
        working-directory: benchmarks

      # RME watch — REPORT-ONLY, never fails the run. Breaches surface here (the offenders in
      # this step's log) and in the step summary's RME watch section, but the workflow indicator
      # stays green. Rationale (was an armed gate until 07-19): this is an honest weekly snapshot
      # on a shared/noisy VM, and the 07-18/19 harness audit showed the armed gate mostly flagged
      # TRANSIENT co-tenancy flares — medians healthy across sessions, not real regressions. Real
      # breakage (broken adapter / contaminated run) is already caught by the completeness gate
      # (run-all's exit code = "0 failed cells" → red job). So RME adds only false-reds as a hard
      # gate; as a watch it's still useful. continue-on-error: a breach shows as a tolerated step
      # failure, the run stays green.
      - name: RME watch (report-only)
        continue-on-error: true
        working-directory: benchmarks
        run: node cross-router/harness/rme-gate.mjs 15 40

      # stamp + win/loss/parity grid (advisory competitive-ratio) + RME watch, from the fresh deck-data.json.
      - name: Step summary
        # Gate on the deck REBUILD, not the matrix: deck-data.json/deck.html are gitignored generated
        # artifacts (not committed), so a failed deck-extract/build-deck leaves NO deck to summarize —
        # absent on a fresh checkout, or a stale partial from this attempt. The success gate keeps
        # ci-summary from rendering a broken/empty snapshot.
        if: ${{ !cancelled() && steps.deck.outcome == 'success' }}
        run: node cross-router/harness/ci-summary.mjs >> "$GITHUB_STEP_SUMMARY"
        working-directory: benchmarks

      # ONE artifact — raw numbers + matcher input + the rebuilt CI deck.
      - name: Upload results + CI deck
        # Same gate as the summary: deck.html/deck-data.json are gitignored generated artifacts, so a
        # failed rebuild leaves no fresh deck (or a stale partial) — don't ship it as this run's snapshot.
        if: ${{ !cancelled() && steps.deck.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          retention-days: 30
          path: |
            benchmarks/cross-router/results
            benchmarks/cross-router/matcher-bench/results.json
            benchmarks/cross-router/deck/out/deck.html
            benchmarks/cross-router/deck/out/deck-data.json
            benchmarks/cross-router/deck/out/cross-router-report.pdf

  publish:
    # One snapshot → Pages. The self-contained CI deck.html is the landing page.
    # TRANSACTIONAL: deploy ONLY a fully-successful bench run. A failed/partial bench (any red step)
    # skips this job entirely — the previous Pages deploy is left untouched, and notify-failure
    # opens a tracking issue. No more "publish in any case".
    needs: bench
    if: needs.bench.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write # only on the publish job
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        continue-on-error: true # no artifact when bench failed before upload / deck rebuild failed — degrade, don't hard-fail
        with:
          name: bench-results
          path: site
      - name: Assemble dashboard
        id: assemble
        # deck.html is self-contained → it IS the dashboard. Keep the raw data alongside for download.
        # Operates only on the downloaded artifact — the repo's deck/ holds tracked SOURCE only; the rendered deck lives only in this artifact/Pages.
        # If the bench produced no artifact (early failure / failed rebuild), skip cleanly — a truly-failed
        # run keeps Pages' last-good deploy instead of a second opaque red job (cp on an empty $deck).
        run: |
          deck=""
          [ -d site ] && deck="$(find site -name deck.html 2>/dev/null | head -1 || true)"
          if [ -z "$deck" ]; then
            echo "no CI deck in artifact — bench produced no snapshot; skipping Pages deploy" >&2
            echo "have_deck=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p public
          cp "$deck" public/index.html
          find site -name deck-data.json -exec cp {} public/deck-data.json \;
          find site -name results.json -path '*matcher-bench*' -exec cp {} public/matcher-results.json \;
          # PDF edition next to index.html so the deck's "Open the full report — PDF" link resolves
          # (a no-op if render-pdf failed → the button 404s but the deck still publishes).
          find site -name cross-router-report.pdf -exec cp {} public/cross-router-report.pdf \;
          echo "have_deck=true" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-pages-artifact@v5
        if: steps.assemble.outputs.have_deck == 'true'
        with:
          path: public
      - id: deploy
        if: steps.assemble.outputs.have_deck == 'true'
        uses: actions/deploy-pages@v5

  # Loudly surface a failed scheduled run — open (or refresh) a tracking issue, the same pattern
  # as examples.yml, so a broken weekly benchmark can't rot unnoticed (the only other signal is an
  # email to the workflow-file author). Skipped on manual workflow_dispatch to avoid noise during
  # verification runs. needs both jobs, so it fires when the bench failed (publish then skipped) OR
  # the publish deploy itself failed.
  notify-failure:
    name: Open issue on failure
    runs-on: ubuntu-latest
    needs: [bench, publish]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- cross-router-bench-failure-tracker -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = '🔴 Cross-router benchmark workflow failing';
            const body = [
              marker,
              'The scheduled **Cross Routers Benchmarks** workflow failed — the Pages snapshot was NOT updated (transactional publish); the previous page stays live.',
              '',
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              '',
              '_Auto-filed by `cross-router-bench.yml`. This comment updates on each subsequent failure; close the issue once green._',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'area: ci/cd',
              per_page: 100,
            });
            const existing = issues.find(i => (i.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'area: ci/cd'],
              });
            }
