name: Post-Merge Build

on:
  push:
    branches: [master]

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: true

# Self-hosted ducktors/turborepo-remote-cache on Cloud Run + Cloudflare R2 (#490)
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `test:stress` intentionally NOT included — mirrors PR CI (`ci.yml`).
      # Leak/race-condition coverage stays in the pre-push hook (`pnpm build`
      # → orchestrator depends on `test:stress` via turbo.json). If a leak
      # ever lands on master through a bot-push that bypasses pre-push (e.g.
      # auto-merged changeset release), re-add `test:stress` to the run line.
      - name: Build
        run: >-
          pnpm turbo run bundle test test:properties
          --filter='!./examples/**'
