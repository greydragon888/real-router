name: Post-Merge Build

on:
  push:
    branches: [master]

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default (the single build job only checks out + uploads an
# artifact). No-op today (repo default is `read`) — insurance against a future
# flip of default_workflow_permissions.
permissions:
  contents: read

# Self-hosted ducktors/turborepo-remote-cache on Cloud Run + Cloudflare R2 (#490)
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `test:stress` intentionally NOT included — mirrors PR CI (`ci.yml`).
      # Leak/race-condition coverage stays in the pre-push hook, which runs
      # `test:stress` as a dedicated `--concurrency=1` step (#1423). If a leak
      # ever lands on master through a bot-push that bypasses pre-push (e.g.
      # auto-merged changeset release), re-add `test:stress` to the run line.
      - name: Build
        run: >-
          pnpm turbo run bundle test test:properties
          --filter='!./examples/**'

      # Publish master's bundle sizes so each PR's `bundle-size` job can diff
      # against them via artifact download — instead of re-checking-out,
      # re-installing, and re-bundling the base branch on every PR (#734).
      # size-limit exits non-zero when a limit is exceeded but still prints the
      # JSON report; capture it and keep the step green (this is a measurement,
      # not a gate). The guard guarantees valid JSON even if nothing was emitted.
      - name: Measure bundle sizes (base for PR diffs)
        run: |
          npx size-limit --json > master-bundle-sizes.json 2>/dev/null || true
          [ -s master-bundle-sizes.json ] || echo '[]' > master-bundle-sizes.json

      - name: Upload base bundle sizes
        uses: actions/upload-artifact@v7
        with:
          name: master-bundle-sizes
          path: master-bundle-sizes.json
          retention-days: 90
