name: Changeset Check

on:
  pull_request:
    branches: [master]

jobs:
  require-changeset:
    name: Require Changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for source changes requiring changeset
        id: check
        run: |
          # Get files changed in PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          PUBLIC_PACKAGES=""
          for dir in packages/*/; do
            [ -f "$dir/package.json" ] || continue
            # Read the actual JSON field, not a `grep '"private"'` substring,
            # which mislabels `"private": false` / a "private" mention as private
            # → a silent loss of the changeset gate for that package's src (3.4).
            if [ "$(node -p "require('./${dir}package.json').private === true" 2>/dev/null)" != "true" ]; then
              PUBLIC_PACKAGES="${PUBLIC_PACKAGES:+$PUBLIC_PACKAGES|}$(basename "$dir")"
            fi
          done

          # Check if any source files in public packages changed.
          # shared/<dir>/*.ts is shipped source too: shared/{browser-env,dom-utils,ssr}
          # is symlinked into 10 public packages, so a change there ships in a
          # release and needs a changeset (turbo hashes it — see turbo.json
          # `../../shared/**/*.ts`; #810). Only .ts counts, mirroring the turbo
          # glob: shared docs (CLAUDE.md, .claude/), shared/package.json, and
          # __test-helpers/ (test-only, never bundled) must not trip this
          # REQUIRED gate — a bare `^shared/` did, on docs-only PRs.
          SOURCE_CHANGED=$(echo "$CHANGED" | grep -E "^packages/($PUBLIC_PACKAGES)/src/|^shared/[^/]+/.*\.ts$" | grep -v '/__test-helpers/' | grep -v '^shared/tests/' || true)

          if [ -z "$SOURCE_CHANGED" ]; then
            echo "No source files changed in public packages"
            echo "needs_changeset=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Source files changed:"
          echo "$SOURCE_CHANGED"
          echo "needs_changeset=true" >> $GITHUB_OUTPUT

          # Check for changeset files
          CHANGESETS=$(echo "$CHANGED" | grep -E '^\.changeset/.*\.md$' | grep -v README.md || true)

          if [ -z "$CHANGESETS" ]; then
            echo "has_changeset=false" >> $GITHUB_OUTPUT
          else
            echo "Changesets found:"
            echo "$CHANGESETS"
            echo "has_changeset=true" >> $GITHUB_OUTPUT
          fi

      # `#trivial` in the PR title is the escape hatch advertised in the failure
      # message below (and in .changeset/README.md). A docs/comment/JSDoc-only
      # change to a public package's `src/` trips the path-based source-changed
      # check yet needs no release — honour the marker here so the advertised
      # hatch actually works. Was previously only echoed, never enforced.
      - name: Fail if changeset missing
        if: steps.check.outputs.needs_changeset == 'true' && steps.check.outputs.has_changeset == 'false' && !contains(github.event.pull_request.title, '#trivial')
        run: |
          echo "::error::Source files changed but no changeset found!"
          echo ""
          echo "Public package source files were modified. A changeset is required."
          echo ""
          echo "To add a changeset, run:"
          echo "  pnpm changeset"
          echo ""
          echo "Or create a file manually in .changeset/ directory."
          echo "See .changeset/README.md for detailed guidelines and examples."
          echo ""
          echo "If this change doesn't need a release, add #trivial to PR title."
          exit 1

  validate-changesets:
    name: Validate Changesets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate changesets
        id: validate
        run: |
          # Single source of truth: .changeset/check-changeset.mjs — the SAME
          # validator the pre-push hook runs (lint:changeset). `--json` emits
          # [{ file, errors, warnings }] for every pending changeset. This
          # replaces the former hand-rolled bash re-implementation of the
          # PR-ref / multi-package / private / major checks, which could (and
          # did) drift from the script's rules. Capture output even on exit 1
          # (invalid) so the PR-comment step can report the details.
          node .changeset/check-changeset.mjs --json > changeset-result.json || true
          cat changeset-result.json

          # Did THIS PR add/modify changesets? Scopes the stale-comment cleanup
          # (so a docs-only PR doesn't churn comments).
          CHANGESETS=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '.changeset/*.md' | grep -v README.md || true)
          if [ -n "$CHANGESETS" ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

          # Any file with errors → issues.
          if node -e "process.exit(require('./changeset-result.json').some((f) => f.errors.length > 0) ? 0 : 1)"; then
            echo "has_issues=true" >> "$GITHUB_OUTPUT"
            echo "::error::Changeset validation failed — see PR comment for details"
          else
            echo "has_issues=false" >> "$GITHUB_OUTPUT"
            echo "✅ All changeset validations passed"
          fi

      - name: Comment on PR
        if: steps.validate.outputs.has_issues == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('changeset-result.json', 'utf8'));
            const failed = results.filter((r) => r.errors.length > 0);

            // One section per failing file, listing its exact validator errors.
            // The validator messages are already actionable (they name the rule
            // and the fix); README has the full guidelines.
            const sections = failed.map((r) =>
              [`### \`${r.file}\``, '', ...r.errors.map((e) => `- ${e}`)].join('\n'),
            );

            const body = [
              '## ❌ Changeset Validation Failed',
              '',
              ...sections,
              '',
              '---',
              '*See [.changeset/README.md](.changeset/README.md) for changeset guidelines and how to fix each rule.*',
            ].join('\n');

            const prNumber = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = 'Changeset Validation Failed';
            const existing = comments.find((c) => c.user.type === 'Bot' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Remove outdated comment
        if: steps.validate.outputs.has_changesets == 'true' && steps.validate.outputs.has_issues == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = 'Changeset Validation Failed';
            const existing = comments.find((c) => c.user.type === 'Bot' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

      - name: Fail if validation issues found
        if: steps.validate.outputs.has_issues == 'true'
        run: |
          echo "Changeset validation failed. See PR comment for details."
          exit 1
