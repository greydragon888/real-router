name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Jobs that need write (duplication→security-events,
# coverage/bundle-size→pull-requests/checks) declare their own job-level
# `permissions:`, which fully overrides this. No-op today (repo
# default_workflow_permissions is already `read`) — this is insurance against a
# future flip of that global setting silently over-permissioning every job.
permissions:
  contents: read

# Turbo Remote Cache - shared across all jobs
# Self-hosted ducktors/turborepo-remote-cache on Cloud Run + Cloudflare R2 (#490)
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Fast check to determine if CI should run
  # Always runs to satisfy required status checks
  check:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.changes.outputs.should_run }}
      turbo_base: ${{ steps.turbo.outputs.base }}
      mode: ${{ steps.plan.outputs.mode }} # 'leaf' | 'sharded'; empty for docs/CI-only PRs
      matrix: ${{ steps.plan.outputs.matrix }} # always-valid JSON; {"include":[]} for leaf
      leaf_filter: ${{ steps.plan.outputs.leaf_filter }} # explicit --filter set for pipeline-leaf; empty on a zero-package leaf
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: changes
        env:
          # Pass the (potentially untrusted) head ref through the environment
          # instead of interpolating ${{ }} directly into the script — avoids
          # the script-injection class actionlint flags, and stops shellcheck's
          # SC2193 false positive from the substituted literal vs. glob compare.
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Skip for release PRs (code already validated by source PR)
          if [[ "$HEAD_REF" == changeset-release/* ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "🚀 Release PR detected, skipping CI"
            exit 0
          fi

          # pull_request-only workflow — base/head come straight from the PR event.
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # "Code" = anything that isn't docs or CI config — EXCEPT .github/actions/**.
          # Composite actions (e.g. actions/setup) execute in every build job, so a
          # change there must run the full pipeline that exercises them. #733 closed
          # this class for workflow files (actionlint on every PR), but composite
          # actions are outside actionlint's scope AND outside a bare '^\.github/'
          # exclude — a setup-only PR skipped ALL CI and broke only after merge (#1128).
          # ERE has no lookahead, so do it in two passes over the changed set (docs
          # dropped up front): (1) everything not under .github/, plus (2) anything
          # under .github/actions/. The '|| true' guards keep a grep no-match exit
          # from tripping the step's `set -eo pipefail`.
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -vE '\.md$' || true)
          NON_GH=$(printf '%s\n' "$CHANGED" | grep -vE '^\.github/' || true)
          GH_ACTIONS=$(printf '%s\n' "$CHANGED" | grep -E '^\.github/actions/' || true)
          CODE_CHANGES=$(printf '%s\n%s\n' "$NON_GH" "$GH_ACTIONS" | grep . | head -1 || true)

          if [ -z "$CODE_CHANGES" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "📝 Only docs/CI changes detected, skipping CI"
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "🔍 Code changes detected, running full CI"
          fi

      # Turbo `--affected` base. This is a pull_request-only workflow, so the
      # step below is currently inert: its push branch never runs, `turbo_base`
      # stays empty, and the pipeline/bundle filters use their
      # `|| 'origin/master'` fallback — i.e. affected packages are computed
      # relative to origin/master, NOT auto-detected per the old comment (#735).
      # The push branch is retained so the step keeps working if a push trigger
      # is ever added.
      - name: Set Turbo SCM base
        id: turbo
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
          fi

      # R2.19: the shard plan (formerly a separate compute-plan job) is folded
      # into check so the leaf/sharded paths don't pay a serial job-prefix.
      # Classify affected → leaf | sharded matrix via build-matrix.mjs (native
      # `turbo query affected`). Runs only when there is code to build; for
      # docs/CI-only PRs `mode`/`matrix` stay empty and every downstream
      # `if: …mode == …` job is skipped.
      - name: Fetch master for Turbo comparison
        if: steps.changes.outputs.should_run == 'true' && github.event_name == 'pull_request'
        run: git fetch origin master:master

      # Minimal install: turbo builds the affected graph from package.json +
      # lockfile, not node_modules. --ignore-scripts is safe — @turbo/<platform>
      # ships its binary via optionalDependencies with no postinstall.
      - name: Setup (pnpm + Node + minimal install)
        if: steps.changes.outputs.should_run == 'true'
        uses: ./.github/actions/setup
        with:
          install-args: --frozen-lockfile --ignore-scripts

      - name: Build shard plan
        id: plan
        if: steps.changes.outputs.should_run == 'true'
        run: node scripts/build-matrix.mjs >> "$GITHUB_OUTPUT"

  # ============================================
  # PIPELINE-LEAF: monolithic path for small, non-core PRs (mode=leaf).
  # Byte-identical to the historical single `pipeline` job; only the two
  # uploaded artifact names carry a `-leaf` suffix (coverage merge, R2.4).
  # turbo run test triggers lint + type-check as deps.
  # turbo run bundle produces dist/ (cache-shared with build).
  # ============================================

  pipeline-leaf:
    name: Pipeline (leaf)
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.mode == 'leaf'
    outputs:
      # 'true' when turbo's affected filter actually produced package outputs.
      # A root config/docs change (e.g. package.json scripts, .jscpd.json) passes
      # the `check` heuristic (should_run=true) yet affects ZERO packages, so
      # test/bundle run nothing and no dist/coverage artifacts exist. Downstream
      # artifact consumers gate on this to skip instead of failing on a missing
      # download. See IMPLEMENTATION_NOTES "CI: artifact-gated downstream jobs".
      built: ${{ steps.artifacts.outputs.built }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch master for Turbo comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin master:master

      - name: Setup (pnpm + Node + install)
        uses: ./.github/actions/setup

      # packages/angular/src/dom-utils is a git-tracked COPY of shared/dom-utils
      # (ng-packagr can't follow symlinks; the prebundle script re-materializes
      # it). If a shared/dom-utils edit lands without re-running the sync,
      # angular's tests exercise the stale committed copy while ng-packagr ships
      # the fresh one — green CI, untested dist (#810). Re-run the sync and fail
      # when the committed copy is out of date. `git status --porcelain` (not
      # `git diff`) so newly added shared files (untracked in the copy) are
      # caught too. The script is dependency-free (node:fs only) and <1s, so it
      # runs before the expensive turbo steps (fail-fast); when the copy is in
      # sync the rewrite is byte-identical and downstream hashes are unaffected.
      - name: Check angular dom-utils copy is in sync
        run: |
          node packages/angular/scripts/sync-dom-utils.mjs
          if [ -n "$(git status --porcelain packages/angular/src/dom-utils)" ]; then
            git status --porcelain packages/angular/src/dom-utils
            echo "::error::packages/angular/src/dom-utils is out of sync with shared/dom-utils — run 'pnpm -F @real-router/angular bundle' (or node packages/angular/scripts/sync-dom-utils.mjs) and commit the result"
            exit 1
          fi

      # Leaf EXECUTION scope = the ROUTING decision. build-matrix.mjs emits
      # leaf_filter as explicit `--filter=<pkg>` tokens from `turbo query affected
      # --packages`, which attributes a ROOT-file change (pnpm-lock.yaml, root
      # tsconfig) to its real package. The git-ref filter `--filter='...[ref]'`
      # instead treats ANY root-file change as touching every workspace, so a
      # Dependabot lockfile bump — routed here as a 1-package leaf — used to
      # execute the whole-repo graph; with Remote Cache off in the Dependabot
      # context (repo secrets withheld) that ran COLD (~8m vs ~2m). Fall back to
      # the git-ref filter only when leaf_filter is empty (a root-config PR
      # touching zero packages — yields zero tasks there, as before). Resolved
      # once into $GITHUB_ENV and reused (word-split, unquoted) by the steps below.
      - name: Resolve leaf filter
        env:
          LEAF_FILTER: ${{ needs.check.outputs.leaf_filter }}
          TURBO_BASE: ${{ needs.check.outputs.turbo_base || 'origin/master' }}
        run: echo "LEAF_FILTER=${LEAF_FILTER:-"--filter=...[$TURBO_BASE]"}" >> "$GITHUB_ENV"

      # Full validation: type-check → lint → test → test:properties.
      # ^bundle for upstream packages runs bundle (tsdown) as a dependency.
      #
      # `test:stress` intentionally NOT included on PR CI — its leak/race-condition
      # signal is low-frequency and the iterations are CPU-expensive (saves
      # ≈5 min of wall time per run, mostly visible on lockfile-bump PRs where
      # the whole project rebuilds). Stress tests still run locally via the
      # pre-push hook, as a dedicated `test:stress --concurrency=1` step (#1423,
      # isolated from the concurrent build so heap thresholds don't flake).
      # Re-introduce them here if a memory-leak regression
      # from a framework adapter bump (React/Vue/Solid/Svelte) ever slips
      # through pre-push.
      #
      # Coverage is enabled in `vitest.config.unit.mts` (coverage.enabled: true)
      # and disabled in property configs (coverage.enabled: false).
      # Passing `-- --coverage` here overrides `enabled: false` for property
      # tasks, which then run with vitest's default reporter set (html,
      # clover, json) — no lcov — and their `clean: true` default wipes the
      # lcov.info that `test` produced a moment earlier. The resulting coverage/
      # directory ends up without lcov.info, which in turn makes SonarCloud see
      # 0% coverage on any new source lines in those packages. Don't add the
      # `-- --coverage` passthrough back — each config controls its own
      # coverage.enabled.
      - name: Test with coverage
        run: >-
          pnpm turbo run test test:properties
          $LEAF_FILTER
          --filter='!./examples/**'
          --filter='!./benchmarks'

      # Bundle affected packages (tsdown/rollup/svelte-package).
      # bundle:upstream → cache hit from test step (^bundle already executed).
      # bundle:affected-leaf → tsdown runs fresh.
      - name: Bundle
        run: >-
          pnpm turbo run bundle
          $LEAF_FILTER
          --filter='!./examples/**'
          --filter='!./benchmarks'

      # Did turbo's affected filter actually build/test any package? On a
      # root config/docs-only PR the answer is no — and there are no dist/
      # or coverage/ dirs to upload, so downstream jobs must skip rather than
      # fail on a missing artifact download.
      - name: Detect produced artifacts
        id: artifacts
        run: |
          # Gate on real FILES, not directory existence (#730). A root config
          # change that isn't a turbo input (.jscpd.json, codecov.yml, knip.json,
          # …) passes the `check` heuristic yet affects ZERO packages, so
          # test/bundle produce nothing — but empty packages/*/dist and
          # packages/*/coverage dirs can still be present. The old
          # nullglob-on-directories check saw those empty dirs and set
          # built=true, while upload-artifact (which needs files inside) created
          # nothing — leaving coverage/sonarcloud/bundle-size to fail on a
          # missing artifact download and blocking the config-only PR via the
          # required CI Result gate.
          #
          # The grouped \( … \) is required: `-path A -o -path B -type f` binds
          # as `A OR (B AND -type f AND -print)`, so a lcov.info match on branch
          # A would never print. Grouping applies -type f/-print/-quit to BOTH.
          produced="$(find packages \( -path '*/coverage/lcov.info' -o -path '*/dist/*' \) -type f -print -quit)"
          if [ -n "$produced" ]; then
            echo "built=true" >> "$GITHUB_OUTPUT"
            echo "🏗️  Affected packages produced artifacts — downstream jobs will run"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No packages affected — downstream artifact jobs will skip"
          fi

      # publint (lint:package) + attw (lint:types) validate the published tarball
      # shape and the type resolution of the dist just built. Both dependsOn
      # bundle, which ran above with the same filter → cache hit, so this is
      # seconds. Previously pre-push only — which Dependabot automerge,
      # `--no-verify`, and web edits all bypass, so a dep/build bump that broke
      # export or .d.ts validity could merge green (#813). Gated on built:
      # nothing bundled → nothing to validate (the affected filter would run zero
      # tasks anyway). Folds into the required CI Result via this job.
      - name: Validate published artifacts (publint + attw)
        if: steps.artifacts.outputs.built == 'true'
        run: >-
          pnpm turbo run lint:package lint:types
          $LEAF_FILTER
          --filter='!./examples/**'
          --filter='!./benchmarks'

      - name: Fix coverage paths
        run: bash scripts/fix-lcov-paths.sh

      - name: Upload coverage artifacts
        if: steps.artifacts.outputs.built == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-leaf
          path: packages/*/coverage/
          retention-days: 1

      - name: Upload build artifacts
        if: steps.artifacts.outputs.built == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist-leaf
          path: packages/*/dist/
          retention-days: 1

  # ============================================
  # BASE — split in two so core's TESTS no longer gate the shards. Shards (and
  # base-test) need only core's BUNDLE, not its test results (turbo `test`
  # dependsOn `^bundle`, not `^test`). So:
  #   base-bundle: bundle + publication lints (publint/attw) → uploads dist-base.
  #     ONLY this gates pipeline-sharded (`needs: base-bundle`) — the fast Amdahl
  #     prefix. Also runs the angular dom-utils sync check once.
  #   base-test:   test + test:properties → uploads coverage-reports-base. Runs in
  #     PARALLEL to the shards; `needs: base-bundle` only so the core-layer
  #     ^bundle arrives as a Remote-Cache HIT (no redundant rebuild). Core's
  #     property-test cost is now OFF the shard critical path (R2.6).
  # Repo-global lints live in the separate parallel repo-lints job.
  # ============================================

  base-bundle:
    name: Base bundle (core layer)
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.mode == 'sharded'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch master for Turbo comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin master:master

      - name: Setup (pnpm + Node + install)
        uses: ./.github/actions/setup

      - name: Check angular dom-utils copy is in sync
        run: |
          node packages/angular/scripts/sync-dom-utils.mjs
          if [ -n "$(git status --porcelain packages/angular/src/dom-utils)" ]; then
            git status --porcelain packages/angular/src/dom-utils
            echo "::error::packages/angular/src/dom-utils is out of sync with shared/dom-utils — run 'pnpm -F @real-router/angular bundle' (or node packages/angular/scripts/sync-dom-utils.mjs) and commit the result"
            exit 1
          fi

      - name: Bundle core layer
        run: pnpm turbo run bundle --filter='@real-router/core...'

      - name: Validate core published artifacts (publint + attw)
        run: pnpm turbo run lint:package lint:types --filter='@real-router/core...'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-base
          path: packages/*/dist/
          retention-days: 1

  # ============================================
  # BASE-TEST: core-layer test + test:properties, PARALLEL to the shards. The
  # heavy property-test cost no longer blocks shard fan-out — only base-bundle
  # does. `needs: base-bundle` purely for the upstream ^bundle Remote-Cache HIT.
  # Emits coverage-reports-base for the coverage / sonar merge.
  # ============================================
  base-test:
    name: Base test (core layer)
    runs-on: ubuntu-latest
    needs: [check, base-bundle]
    if: needs.check.outputs.mode == 'sharded'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch master for Turbo comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin master:master

      - name: Setup (pnpm + Node + install)
        uses: ./.github/actions/setup

      # base-test OWNS the "base" layer: build-matrix.mjs classifies these 8
      # packages (CORE_LAYER) as the `base` group and EXCLUDES them from the
      # dynamic shards, delegating their test+coverage to this job. The filter
      # must therefore run `test` on EACH of them.
      #
      # `--filter='@real-router/core...'` does NOT do that: turbo's `pkg...`
      # expands the package *scope* to core+deps, but runs the requested task
      # (`test`) ONLY on the matched package (core). The deps are pulled into the
      # graph solely via `test`'s `dependsOn` (^bundle, lint, type-check) — and
      # `test` has no `^test`, so the deps' own `test` never runs. Result: only
      # core was tested here, the other 4 base-layer packages (engine, fsm,
      # logger) were tested NOWHERE
      # (shards exclude them too), so they emitted no lcov and SonarCloud scored
      # their changed lines as 0% on any PR touching them (#1030 hit it via
      # event-emitter — new_coverage 76.1% < 80%, gate FAILED).
      #
      # Fix: filter each base-layer package explicitly. The list is sourced from
      # build-matrix.mjs CORE_LAYER (the single source of truth that also decides
      # shard exclusion), so the two cannot drift. $FILTERS is intentionally
      # unquoted (bash word-splitting into separate --filter=<pkg> tokens) —
      # same pattern as the shards' $SHARD_FILTER.
      - name: Test core layer
        run: |
          FILTERS=$(node -e 'import("./scripts/build-matrix.mjs").then((m) => process.stdout.write([...m.CORE_LAYER].map((p) => "--filter=" + p).join(" ")))')
          echo "Core-layer filters: $FILTERS"
          # #1065: shared/{browser-env,dom-utils} coverage is now owned by the
          # consumer packages (browser-plugin ← browser-env, react ← dom-utils) and
          # rides along in their shard jobs; there is no separate shared test node to
          # run here anymore.
          # shellcheck disable=SC2086
          pnpm turbo run test test:properties $FILTERS

      - name: Fix coverage paths
        run: bash scripts/fix-lcov-paths.sh

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-base
          path: |
            packages/*/coverage/
          retention-days: 1

  # ============================================
  # REPO-LINTS: repo-global lints (syncpack / pnpm dedupe / coverage-scope /
  # knip) — not per-package, not affected-scoped, and not turbo-cached (direct
  # pnpm scripts that re-run every time). Pulled OUT of base + pipeline-leaf into
  # a standalone job that runs in PARALLEL on both paths, so they no longer
  # inflate the base→shards Amdahl prefix (R2.6). Needs only install — no build,
  # no coverage. Mode-independent: runs on every should_run PR; CI gate requires
  # it (hard, not ok()-skippable).
  # ============================================
  repo-lints:
    name: Repo Lints
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup (pnpm + Node + install)
        uses: ./.github/actions/setup

      - name: Check dependency consistency
        run: pnpm lint:deps

      - name: Check for duplicate dependencies
        run: pnpm lint:dedupe

      # Guard: codecov.yml components + Sonar coverage-exclusions stay in sync
      # with the package set, so external quality gates can't silently drift (#732).
      - name: Check coverage scope
        run: pnpm lint:coverage-scope

      # Dead-code / unused-export / unused-dependency detection (knip). Pure
      # source-graph analysis — no dist needed. Catches unused introduced by a PR
      # that turbo's affected filter scored as "nothing built". Previously
      # pre-push only (#813); the hard jscpd duplication threshold stays in the
      # hook — CI keeps the informational SARIF channel instead.
      - name: Check for unused code
        run: pnpm lint:unused

      # Unit-test the CI meta-layer itself (scripts/*.test.mjs — stdlib
      # node:test, zero install/turbo dependency, so it runs here rather than
      # in the turbo graph): the shard planner (build-matrix.*) gating the
      # leaf/sharded routing + input-aware membership logic (#1067, R2.18), and
      # the gate needs-completeness meta-test (ci-gate-completeness.test.mjs) —
      # every ci.yml job must feed the CI Result gate or be allowlisted with a
      # written reason (the #1127 class, debt-map axis A6).
      - name: Test CI meta (shard planner + gate completeness)
        run: node --test scripts/*.test.mjs

  # ============================================
  # PIPELINE-SHARDED: one runner per affected class (mode=sharded). The matrix
  # comes from check (R2.19); empty groups never enter matrix.include → their
  # runner is not spawned. core arrives from base-bundle / Remote Cache as a
  # HIT (not a rebuild). Coverage is a disjoint partition (turbo `test` has no
  # `^test`), so per-shard lcov never overlaps base-test's.
  # ============================================

  pipeline-sharded:
    name: Pipeline (shard ${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [check, base-bundle]
    if: needs.check.outputs.mode == 'sharded'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check.outputs.matrix || '{"include":[]}') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch master for Turbo comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin master:master

      - name: Setup (pnpm + Node + install)
        uses: ./.github/actions/setup

      - name: Check angular dom-utils copy is in sync
        run: |
          node packages/angular/scripts/sync-dom-utils.mjs
          if [ -n "$(git status --porcelain packages/angular/src/dom-utils)" ]; then
            git status --porcelain packages/angular/src/dom-utils
            echo "::error::packages/angular/src/dom-utils is out of sync with shared/dom-utils — run 'pnpm -F @real-router/angular bundle' (or node packages/angular/scripts/sync-dom-utils.mjs) and commit the result"
            exit 1
          fi

      # matrix.filter is one or more `--filter=<pkg>` tokens. Route it through an
      # env var (no ${{ }} inside run: — keeps actionlint clean) and leave it
      # UNQUOTED so the shell word-splits multiple filters.
      - name: Test + bundle shard
        env:
          SHARD_FILTER: ${{ matrix.filter }}
        run: pnpm turbo run test test:properties bundle $SHARD_FILTER --filter='!./examples/**' --summarize

      # Per-task execution timings (.turbo/runs/*.json) — perf diagnostics to
      # localize which shard task dominates (e.g. solid#test vs react#test under
      # vite-plugin-solid's on-the-fly babel compile). if: always() so a failing
      # shard still uploads what ran.
      - name: Upload turbo run summary (per-task timings)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: turbo-summary-${{ matrix.name }}
          path: .turbo/runs/
          retention-days: 1

      - name: Validate shard published artifacts (publint + attw)
        env:
          SHARD_FILTER: ${{ matrix.filter }}
        run: pnpm turbo run lint:package lint:types $SHARD_FILTER --filter='!./examples/**'

      - name: Fix coverage paths
        run: bash scripts/fix-lcov-paths.sh

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ matrix.name }}
          path: packages/*/coverage/
          retention-days: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.name }}
          path: packages/*/dist/
          retention-days: 1

  # ============================================
  # DOWNSTREAM: Smoke, Coverage, SonarCloud, Bundle Size
  # ============================================

  # Smoke test: pack all public packages, install from tarballs
  # into an isolated project, verify every export resolves.
  # Uses `bundle` (not `build`) — no test/lint overhead.
  smoke:
    name: Package Smoke Test
    runs-on: ubuntu-latest
    # smoke bundles every package (base-bundle + shards warm the cache) and
    # resolves exports — it needs BUNDLES, not test results, so it does NOT depend
    # on base-test. Dropping base-test lets smoke run in PARALLEL with the core
    # property-tests instead of serialized behind the heaviest job (~2-4 min
    # wall-clock on a sharded PR, #1130). Gating integrity is unchanged: the CI
    # Result gate still requires base-test == success independently (job `ci`).
    needs: [check, pipeline-leaf, base-bundle, pipeline-sharded]
    # Active path succeeded: leaf → pipeline-leaf; sharded → base-bundle
    # + all shards (empty matrix.include → pipeline-sharded 'skipped', carried by base-bundle).
    if: >-
      always() &&
      needs.check.outputs.should_run == 'true' &&
      (
        (needs.check.outputs.mode == 'leaf' &&
          needs.pipeline-leaf.result == 'success') ||
        (needs.check.outputs.mode == 'sharded' &&
          needs.base-bundle.result == 'success' &&
          (needs.pipeline-sharded.result == 'success' || needs.pipeline-sharded.result == 'skipped'))
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup (pnpm + Node + install)
        uses: ./.github/actions/setup

      # bundle (not build) — only tsdown, no test/lint/type-check.
      # Affected + upstream → remote cache from pipeline.
      # Non-affected → remote cache from previous CI runs.
      - name: Bundle all packages
        run: pnpm turbo run bundle --filter='./packages/*'

      - name: Run smoke test
        run: bash scripts/smoke-test-packages.sh

  # Code duplication — INFORMATIONAL ONLY, never blocks the merge.
  # The hard duplication gate stays in the pre-push hook (`pnpm lint:duplicates`,
  # threshold 2% in `.jscpd.json`). This job re-runs jscpd with the SARIF reporter
  # and `-t 100` (so jscpd itself always exits 0) and uploads the report to GitHub
  # Code Scanning — duplication then surfaces as PR annotations + Security-tab
  # entries without gating CI. NOT in the `ci` gate's `needs`, so it can't block.
  duplication:
    name: Code Duplication (SARIF)
    needs: [check]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # jscpd only reads packages/*/src/ and has NO workspace-package deps — its
      # engine ships as a platform binary via optionalDependencies (cpd-<arch>).
      # So skip the full 32-package `pnpm install` (~30-60s on a store cache-miss,
      # #734) and fetch only jscpd via dlx (hardlinked from the setup-node pnpm
      # store cache). The version is read from package.json so a Dependabot jscpd
      # bump can't drift. Args mirror the root `lint:duplicates:sarif` script
      # (-t 100 = threshold 100 so jscpd always exits 0 — this job is
      # informational, it only uploads SARIF to Code Scanning, never gates).
      - name: Detect duplication (SARIF)
        run: |
          jscpd_version="$(node -p "require('./package.json').devDependencies.jscpd")"
          pnpm dlx "jscpd@${jscpd_version}" packages/*/src/ --no-tips -t 100 -r sarif -o jscpd-report

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: jscpd-report/jscpd-report.sarif
          category: jscpd

  coverage:
    name: Coverage (Codecov)
    needs: [check, pipeline-leaf, base-bundle, base-test, pipeline-sharded]
    if: >-
      always() &&
      needs.check.outputs.should_run == 'true' &&
      (
        (needs.check.outputs.mode == 'leaf' &&
          needs.pipeline-leaf.result == 'success' &&
          needs.pipeline-leaf.outputs.built == 'true') ||
        (needs.check.outputs.mode == 'sharded' &&
          needs.base-bundle.result == 'success' &&
          needs.base-test.result == 'success' &&
          (needs.pipeline-sharded.result == 'success' || needs.pipeline-sharded.result == 'skipped'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
      actions: read # listWorkflowRunArtifacts for the R2.4 integrity check
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Pin Node for the --emit script (fs-only, no pnpm install) instead of
      # relying on the runner image's system node.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Merge every per-path coverage artifact into one tree: leaf emits a single
      # `coverage-reports-leaf`; sharded emits `coverage-reports-base` + one
      # `coverage-reports-<shard>` each. Coverage is a disjoint partition (turbo
      # `test` has no `^test`), so no lcov collides on merge.
      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-reports-*
          merge-multiple: true
          path: packages

      # R2.4: a silently-lost shard upload would understate coverage and mask a
      # gap. Assert every expected coverage artifact exists (base + one per shard).
      - name: Verify all coverage shards uploaded
        if: needs.check.outputs.mode == 'sharded'
        uses: actions/github-script@v9
        env:
          MATRIX: ${{ needs.check.outputs.matrix }}
        with:
          script: |
            const include = JSON.parse(process.env.MATRIX).include;
            const expected = ['coverage-reports-base', ...include.map((s) => `coverage-reports-${s.name}`)];
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const present = new Set(data.artifacts.map((a) => a.name));
            const missing = expected.filter((n) => !present.has(n));
            if (missing.length) core.setFailed(`Missing coverage artifacts: ${missing.join(', ')}`);

      # Collect every produced lcov dynamically — a hardcoded `files:` list drifts
      # out of sync as packages are added (#732): it had 16 stale paths (several
      # private) and missed ~14 public packages. The scope comes from the same
      # script that guards codecov.yml/sonar-project.properties (--emit mode),
      # so the CI scope and the drift guard cannot disagree. The script fails
      # loudly if no lcov.info exists after the artifact download.
      - name: Collect coverage reports
        id: lcov
        run: node scripts/check-coverage-scope.mjs --emit >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.lcov.outputs.reports }}
          disable_search: true
          fail_ci_if_error: true

  sonarcloud:
    name: SonarCloud
    needs: [check, pipeline-leaf, base-bundle, base-test, pipeline-sharded]
    if: >-
      always() &&
      needs.check.outputs.should_run == 'true' &&
      github.actor != 'dependabot[bot]' &&
      (
        (needs.check.outputs.mode == 'leaf' &&
          needs.pipeline-leaf.result == 'success' &&
          needs.pipeline-leaf.outputs.built == 'true') ||
        (needs.check.outputs.mode == 'sharded' &&
          needs.base-bundle.result == 'success' &&
          needs.base-test.result == 'success' &&
          (needs.pipeline-sharded.result == 'success' || needs.pipeline-sharded.result == 'skipped'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Pin Node for the `node -p` version read and the --emit scope script
      # (fs-only, no pnpm install) instead of relying on the runner's system node.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Same per-path coverage merge as the Codecov job (leaf single artifact OR
      # base + per-shard). check-coverage-scope --emit rescans after the merge.
      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-reports-*
          merge-multiple: true
          path: packages

      - name: Cache SonarCloud packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Get version from core package
        id: version
        run: |
          VERSION=$(node -p 'require("./packages/core/package.json").version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Generate analysis scope from the filesystem (#732). The static lists in
      # sonar-project.properties drifted (11 sources vs 25 public packages);
      # scanner CLI args override the properties file, so this is the source of
      # truth. The scope comes from scripts/check-coverage-scope.mjs --emit —
      # the same script that guards codecov.yml/sonar-project.properties, so the
      # CI scope and the drift guard cannot disagree. sources = real (non-symlink)
      # packages/*/src dirs + shared/* (sonar-scanner does not index files under
      # symlinked directories, so browser-env/dom-utils src symlinks are skipped
      # and the shared code is analysed at its real location, coverage-excluded
      # via `shared/**`). reportPaths = every produced lcov; core-types has none
      # → it stays in sources but is coverage-excluded so Sonar doesn't score
      # it 0%. Runs on the runner's system node — fs-only, no install needed.
      - name: Compute Sonar scope
        id: scope
        run: node scripts/check-coverage-scope.mjs --emit >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.version.outputs.version }}
            -Dsonar.sources=${{ steps.scope.outputs.sources }}
            -Dsonar.tests=${{ steps.scope.outputs.tests }}
            -Dsonar.javascript.lcov.reportPaths=${{ steps.scope.outputs.reports }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  bundle-size:
    name: Bundle Size
    # bundle-size starts from dist artifacts (dist-base + dist-<shard>) plus a
    # cache-fill bundle — base-test produces NO dist (coverage only), so it does
    # not belong on this job's path. Same class as smoke (#1130); the win here is
    # an earlier PR size comment, not gate wall-clock (bundle-size is not in the
    # `ci` gate). coverage/sonarcloud DO keep base-test — they consume its
    # coverage-reports-base artifact.
    needs: [check, pipeline-leaf, base-bundle, pipeline-sharded]
    if: >-
      always() &&
      needs.check.outputs.should_run == 'true' &&
      github.event_name == 'pull_request' &&
      (
        (needs.check.outputs.mode == 'leaf' &&
          needs.pipeline-leaf.result == 'success' &&
          needs.pipeline-leaf.outputs.built == 'true') ||
        (needs.check.outputs.mode == 'sharded' &&
          needs.base-bundle.result == 'success' &&
          (needs.pipeline-sharded.result == 'success' || needs.pipeline-sharded.result == 'skipped'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read # gh run list/download of the master bundle-size artifact (#734)
    steps:
      # ── PR sizes: start from pipeline's dist artifact (affected + upstream),
      #    then fill in non-affected packages from turbo remote cache so
      #    size-limit sees every dist/. Symmetric with the base-branch step
      #    below (`pnpm turbo run bundle --filter='./packages/*'`).
      - name: Checkout PR
        uses: actions/checkout@v7

      # Merge dist from whichever path ran (dist-leaf OR dist-base + dist-<shard>);
      # the cache-fill bundle step below fills any non-affected packages.
      - name: Download PR dist artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          merge-multiple: true
          path: packages

      - name: Setup (pnpm + Node + install)
        uses: ./.github/actions/setup

      # Fill in dist/ for packages that pipeline skipped (non-affected).
      # Affected packages already have dist from the downloaded artifact;
      # everything else is a turbo remote-cache hit.
      - name: Bundle remaining packages (cache-hit for non-affected)
        run: pnpm turbo run bundle --filter='./packages/*'

      - name: Get PR sizes
        id: pr_sizes
        run: |
          echo "sizes<<EOF" >> $GITHUB_OUTPUT
          output=$(npx size-limit --json 2>/dev/null) || true
          echo "${output:-[]}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Base sizes: download master's sizes published by post-merge.yml (#734)
      #    instead of re-checking-out + re-installing + re-bundling the base
      #    branch on every PR. github.base_ref is master, and the latest
      #    successful post-merge run built exactly that tip, so its artifact is
      #    the right baseline. Falls back to [] (every package shown as "new",
      #    same as the old behaviour when base measurement failed) when no
      #    artifact exists yet — e.g. the first PR opened before this change's
      #    own post-merge run lands, or after the 90-day retention ages out.
      - name: Download base sizes from master
        id: base_sizes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sizes='[]'
          run_id="$(gh run list -R "$GITHUB_REPOSITORY" --workflow=post-merge.yml \
            --branch=master --status=success --limit=1 \
            --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)"
          if [ -n "$run_id" ] \
            && gh run download "$run_id" -R "$GITHUB_REPOSITORY" \
                 --name master-bundle-sizes --dir /tmp/base-sizes 2>/dev/null \
            && [ -s /tmp/base-sizes/master-bundle-sizes.json ]; then
            sizes="$(cat /tmp/base-sizes/master-bundle-sizes.json)"
            echo "✓ Base sizes from post-merge run $run_id"
          else
            echo "ℹ️ No master bundle-size artifact — base defaults to [] (sizes shown as new)"
          fi
          {
            echo "sizes<<EOF"
            echo "$sizes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compare and comment
        uses: actions/github-script@v9
        with:
          script: |
            const prSizes = JSON.parse(`${{ steps.pr_sizes.outputs.sizes }}` || '[]');
            const baseSizes = JSON.parse(`${{ steps.base_sizes.outputs.sizes }}` || '[]');

            const formatBytes = (bytes) => {
              if (bytes == null || isNaN(bytes)) return '—';
              if (bytes === 0) return '0 B';
              const sign = bytes < 0 ? '-' : '';
              const abs = Math.abs(bytes);
              const k = 1000; // SI units (same as size-limit: 1 kB = 1000 bytes)
              const sizes = ['B', 'KB', 'MB'];
              const i = Math.floor(Math.log(abs) / Math.log(k));
              return sign + parseFloat((abs / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            };

            const formatDiff = (pr, base) => {
              if (pr == null || isNaN(pr)) return '—';
              if (!base || isNaN(base)) return 'new';
              const diff = pr - base;
              const percent = base > 0 ? ((diff / base) * 100).toFixed(1) : 0;
              if (diff === 0) return '0';
              const sign = diff > 0 ? '+' : '';
              return `${sign}${formatBytes(diff)} (${sign}${percent}%)`;
            };

            const baseMap = new Map();
            for (const item of baseSizes) {
              baseMap.set(item.name, item.size);
            }

            let rows = [];
            let totalPr = 0;
            let totalBase = 0;
            let hasChanges = false;

            for (const item of prSizes) {
              const prSize = item.size ?? 0;
              const baseSize = baseMap.get(item.name) ?? 0;
              totalPr += isNaN(prSize) ? 0 : prSize;
              totalBase += isNaN(baseSize) ? 0 : baseSize;

              const diff = (isNaN(prSize) ? 0 : prSize) - (isNaN(baseSize) ? 0 : baseSize);
              if (diff !== 0) hasChanges = true;

              const status = item.passed === false ? '❌' : '✅';
              rows.push(`| ${status} | ${item.name} | ${formatBytes(item.size)} | ${formatBytes(baseMap.get(item.name))} | ${formatDiff(item.size, baseMap.get(item.name))} |`);
            }

            let body = `## Bundle Size Report\n\n`;

            if (prSizes.length === 0) {
              body += `Could not measure bundle sizes.\n`;
            } else {
              body += `| Status | Package | PR Size | Base Size | Diff |\n`;
              body += `|--------|---------|---------|-----------|------|\n`;
              body += rows.join('\n');
              body += `\n\n`;

              const totalDiff = totalPr - totalBase;
              const totalPercent = totalBase > 0 ? ((totalDiff / totalBase) * 100).toFixed(1) : 0;
              const totalSign = totalDiff > 0 ? '+' : '';

              body += `**Total:** ${formatBytes(totalPr)} (${totalSign}${formatBytes(totalDiff)}, ${totalSign}${totalPercent}%)\n\n`;

              if (!hasChanges) {
                body += `No size changes detected.\n`;
              }

              const failures = prSizes.filter(s => s.passed === false);
              if (failures.length > 0) {
                body += `\n**Size limit exceeded for:** ${failures.map(f => f.name).join(', ')}\n`;
              }
            }

            body += `\n<details><summary>Size limits configured in <code>.size-limit.js</code></summary>\n\n`;
            body += `Run \`pnpm size\` locally to check bundle sizes.\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('Bundle Size Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            core.summary.addRaw(body).write();

  # ============================================
  # WORKFLOW LINT: actionlint — runs on EVERY PR (no should_run gate)
  # Closes the gap (#733) where a PR touching only .github/workflows/*.yml sets
  # should_run=false → pipeline/smoke/sonar skip → the highest-risk code class
  # (executable workflows with secret/publish access) merged with ZERO automated
  # validation. Pinned by digest (rhysd/actionlint 1.7.8); the image bundles
  # shellcheck + pyflakes, so it also catches shell bugs in `run:` blocks.
  # SHELLCHECK_OPTS=--severity=warning drops the benign SC2086/SC2001 info/style
  # noise on `>> $GITHUB_OUTPUT`-style writes while keeping warnings, errors, and
  # actionlint's own expression/script-injection checks gating. Result is folded
  # into "CI Result" below so the single required check covers it.
  # ============================================
  actionlint:
    name: Lint Workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run actionlint
        uses: docker://rhysd/actionlint@sha256:96d4a8c87dbbfb3bdd324f8fdc285fc3df5261e2decc619a4dd7e8ee52bbfd46
        with:
          args: -color
        env:
          SHELLCHECK_OPTS: --severity=warning

  # ============================================
  # GATE: Single required status check
  # Configure "CI Result" in branch protection
  # ============================================

  ci:
    name: CI Result
    runs-on: ubuntu-latest
    needs: [check, pipeline-leaf, base-bundle, base-test, pipeline-sharded, repo-lints, smoke, coverage, sonarcloud, actionlint]
    if: always()
    steps:
      - name: Determine result
        run: |
          # actionlint runs on every PR (no should_run gate), so check it before
          # the docs/CI-only short-circuit — that's the whole point of #733: a
          # workflow-only PR must not pass the gate without workflow validation.
          ACTIONLINT="${{ needs.actionlint.result }}"
          if [[ "$ACTIONLINT" != "success" ]]; then
            echo "❌ actionlint failed (workflow lint)"
            exit 1
          fi

          # check must have SUCCEEDED before ANY of its outputs can be trusted.
          # A check that dies before the change-detection step writes should_run
          # (transient checkout/diff failure) leaves should_run empty — which the
          # docs-only short-circuit below would otherwise read as a green skip,
          # passing this required gate while check is RED and every functional job
          # was skipped (vacuous pass, #1133). Placed before the short-circuit so
          # the empty-output case is caught; also subsumes the old "plan step
          # died" case (check.result=failure either way).
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "❌ check job failed — cannot trust its outputs (mode/should_run)"
            exit 1
          fi

          if [[ "${{ needs.check.outputs.should_run }}" != "true" ]]; then
            echo "✅ Skipped — no code changes (actionlint passed)"
            exit 0
          fi

          PLAN="${{ needs.check.result }}"
          MODE="${{ needs.check.outputs.mode }}"
          LEAF="${{ needs.pipeline-leaf.result }}"
          BASE_BUNDLE="${{ needs.base-bundle.result }}"
          BASE_TEST="${{ needs.base-test.result }}"
          SHARDED="${{ needs.pipeline-sharded.result }}"
          SMOKE="${{ needs.smoke.result }}"
          COVERAGE="${{ needs.coverage.result }}"
          SONAR="${{ needs.sonarcloud.result }}"
          LINTS="${{ needs.repo-lints.result }}"
          echo "plan=$PLAN mode=$MODE leaf=$LEAF base_bundle=$BASE_BUNDLE base_test=$BASE_TEST sharded=$SHARDED smoke=$SMOKE coverage=$COVERAGE sonar=$SONAR lints=$LINTS"

          # Defensive belt-and-suspenders on the shard-plan output (R2.19): the
          # check-result guard at the top of this step already exits on any check
          # failure (#1133), so this is now redundant — kept as a cheap guard.
          if [[ "$PLAN" != "success" ]]; then
            echo "❌ check / shard plan failed"
            exit 1
          fi

          # ok(): success OR skipped. Used ONLY for smoke/coverage/sonar (coverage
          # & sonar legitimately skip on a built==false leaf; sonar also skips on
          # dependabot — codecov runs tokenless there and stays gated) and an
          # empty-include pipeline-sharded — NEVER for the job that DEFINES the
          # active path (pipeline-leaf / base-bundle + base-test), so a real
          # failure there cannot be masked as a skip.
          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }

          case "$MODE" in
            leaf)
              [[ "$LEAF" == "success" ]] && PATH_OK=1 || PATH_OK=0 ;;
            sharded)
              { [[ "$BASE_BUNDLE" == "success" ]] && [[ "$BASE_TEST" == "success" ]] && ok "$SHARDED"; } && PATH_OK=1 || PATH_OK=0 ;;
            *)
              echo "❌ unknown shard-plan mode '$MODE'"
              exit 1 ;;
          esac

          # repo-lints runs on every should_run PR in BOTH modes — past the
          # should_run short-circuit above it must have run AND passed (hard
          # requirement, not ok()-skippable like smoke/sonar).
          if [[ "$PATH_OK" == "1" ]] && [[ "$LINTS" == "success" ]] && ok "$SMOKE" && ok "$COVERAGE" && ok "$SONAR"; then
            echo "✅ All checks passed"
            exit 0
          fi

          echo "❌ CI failed"
          exit 1
