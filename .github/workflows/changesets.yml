name: Changesets

on:
  workflow_run:
    workflows: [Post-Merge Build]
    types: [completed]
    branches: [master]

# Changesets Workflow for Automated Versioning and Publishing
#
# How it works:
# 1. Developer creates a changeset: `pnpm changeset`
# 2. Changeset file (.changeset/*.md) is committed and pushed
# 3. This workflow creates/updates a "Version Packages" PR
# 4. Maintainer reviews and merges the Release PR
# 5. On next push to master, packages are published to npm
#
# OIDC Trusted Publishing:
# - Uses npm Trusted Publishing with OIDC (no NPM_TOKEN required)
# - Requires Node.js 24+ (npm >= 11.5.1)
# - Each package must be configured on npmjs.com with Trusted Publisher:
#   * Provider: GitHub Actions
#   * Organization/User: greydragon888
#   * Repository: real-router
#   * Workflow: changesets.yml

# Serialize publishing — never cancel a run mid-flight. cancel-in-progress: true
# could kill `changeset publish` between npm publish and tag/release creation,
# leaving packages on npm with no tag/Release (a latent path to the partial
# state of #731). Queued runs wait; the reconcile step makes them idempotent.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write # Required for OIDC Trusted Publishing

# Turbo Remote Cache
# Self-hosted ducktors/turborepo-remote-cache on Cloud Run + Cloudflare R2 (#490)
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          # NOTE: Do NOT use registry-url here!
          # It creates .npmrc with ${NODE_AUTH_TOKEN} which conflicts with OIDC.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: check
        run: |
          # Check if there are any changeset files (excluding README)
          CHANGESETS=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          echo "changesets_count=$CHANGESETS" >> $GITHUB_OUTPUT
          echo "Found $CHANGESETS changeset(s)"

      # Extract PR/issue references from changeset files for Release PR title
      - name: Extract PR references
        if: steps.check.outputs.changesets_count != '0'
        id: refs
        run: |
          # Find all #XX references in changeset files (excluding README)
          REFS=$(grep -roh '#[0-9]\+' .changeset/*.md 2>/dev/null | sort -u | tr '\n' ' ' | xargs)
          if [ -n "$REFS" ]; then
            echo "refs= ($REFS)" >> $GITHUB_OUTPUT
            echo "Found PR references: $REFS"
          else
            echo "refs=" >> $GITHUB_OUTPUT
            echo "No PR references found in changesets"
          fi

      # If there are changesets, create/update the release PR
      - name: Create Release PR
        if: steps.check.outputs.changesets_count != '0'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version
          title: "release: version packages${{ steps.refs.outputs.refs }}"
          commit: "release: version packages${{ steps.refs.outputs.refs }}"
          setupGitUser: false
        env:
          # Use PAT instead of GITHUB_TOKEN to trigger CI workflows on created PR
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          # Skip husky hooks during release commit (CI already validated)
          HUSKY: 0
          GIT_AUTHOR_NAME: ${{ github.repository_owner }}
          GIT_AUTHOR_EMAIL: ${{ github.repository_owner }}@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ github.repository_owner }}
          GIT_COMMITTER_EMAIL: ${{ github.repository_owner }}@users.noreply.github.com

      # If no changesets, check if there are unpublished versions
      - name: Check for unpublished packages
        if: steps.check.outputs.changesets_count == '0'
        id: unpublished
        run: |
          echo "Checking for unpublished package versions..."
          UNPUBLISHED=""

          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              name=$(node -p "require('./${dir}package.json').name")
              local_version=$(node -p "require('./${dir}package.json').version")
              private=$(node -p "require('./${dir}package.json').private || false")

              if [ "$private" = "true" ]; then
                echo "⏭️ $name is private, skipping"
                continue
              fi

              # Check if this version exists on npm
              npm_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

              if [ "$local_version" != "$npm_version" ]; then
                echo "📦 $name: local=$local_version, npm=$npm_version (needs publish)"
                UNPUBLISHED="$UNPUBLISHED $name"
              else
                echo "✅ $name: $local_version (already published)"
              fi
            fi
          done

          if [ -n "$UNPUBLISHED" ]; then
            echo "has_unpublished=true" >> $GITHUB_OUTPUT
            echo "packages=$UNPUBLISHED" >> $GITHUB_OUTPUT
          else
            echo "has_unpublished=false" >> $GITHUB_OUTPUT
          fi

      # Build (includes tests via dependsOn) before publishing
      - name: Build packages
        if: steps.unpublished.outputs.has_unpublished == 'true'
        run: pnpm turbo run build --filter='!./examples/**'

      # Publish with OIDC Trusted Publishing
      # changeset publish automatically:
      # - Checks which versions are not on npm
      # - Publishes in dependency order
      # - Skips already published (warns, doesn't fail)
      # - Creates git tags (NOTE: tag failures are silently swallowed — see fallback below)
      # - Uses pnpm publish (detects from lockfile)
      # Provenance is auto-generated with npm Trusted Publishing
      - name: Publish to npm
        if: steps.unpublished.outputs.has_unpublished == 'true'
        id: publish
        # Changesets creates annotated tags (git tag -m) which require tagger identity.
        # Without these env vars, git tag silently fails on some CI runners.
        # See: https://github.com/changesets/changesets/issues/1621
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          OUTPUT=$(pnpm changeset publish 2>&1) || true
          echo "$OUTPUT"

          # Extract new tag names from changeset output (one per line, trimmed)
          NEW_TAGS=$(echo "$OUTPUT" | grep "New tag:" | sed 's/.*New tag:[[:space:]]*//' | sed 's/[[:space:]]*$//')
          if [ -n "$NEW_TAGS" ]; then
            {
              echo "new_tags<<EOF"
              echo "$NEW_TAGS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Push git tags
        if: steps.publish.outputs.new_tags != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          HUSKY: 0
        run: |
          # Push to a one-shot authenticated URL instead of `git remote set-url`
          # (#735 hardening): `set-url` would write the PAT into .git/config in
          # plaintext for the rest of the job; passing the URL per-push keeps the
          # token in this step's env only, never persisted to disk. GH_TOKEN is a
          # secret, so Actions masks it in logs.
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          echo "=== Tags after changeset publish ==="
          echo "Total local tags: $(git tag -l | wc -l)"
          echo "Recent tags:"
          git tag -l --sort=-creatordate | head -15

          PUSHED=0
          MISSING=0

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
              echo "Pushing $tag..."
              git push "$REMOTE" "refs/tags/$tag:refs/tags/$tag"
              PUSHED=$((PUSHED + 1))
            else
              echo "⚠️ Tag $tag NOT found locally — changeset publish failed to create it"
              MISSING=$((MISSING + 1))
            fi
          done <<< "${{ steps.publish.outputs.new_tags }}"

          echo "=== Result: pushed=$PUSHED, missing=$MISSING ==="

          # Fallback: if any tags are missing, create them manually pointing at HEAD.
          # This works around https://github.com/changesets/changesets/issues/1621
          # where changeset publish silently swallows git tag failures.
          if [ "$MISSING" -gt 0 ]; then
            echo "⚠️ Creating missing tags manually..."
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              if ! git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
                echo "Creating and pushing $tag..."
                git tag "$tag"
                git push "$REMOTE" "refs/tags/$tag:refs/tags/$tag"
                PUSHED=$((PUSHED + 1))
              fi
            done <<< "${{ steps.publish.outputs.new_tags }}"
            echo "=== After fallback: pushed=$PUSHED ==="
          fi

      # Reconcile GitHub Releases — create a Release for EVERY published package
      # tag that lacks one, on every run (NOT gated on has_unpublished). The old
      # step was gated `if: has_unpublished == 'true'`; a one-time failure left
      # tags on npm+git with no Release forever, because the next run saw
      # local==npm (has_unpublished=false) and skipped the whole release path
      # (#731, 0.56.0 batch). Tag-driven + idempotent: existing releases are
      # fetched once and skipped, so this can also backfill misses that an
      # earlier failed run dropped. `set -euo pipefail` + per-step `::group::`
      # tracing so a failure is diagnosable (the original exit 128 was not).
      - name: Reconcile GitHub Releases
        if: steps.check.outputs.changesets_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "::group::Fetch tags + existing releases"
          git fetch --tags --force origin
          # One API call for the full release set — 800+ package tags exist, so
          # a per-tag `gh release view` sweep would be 800+ calls. Fail-fast if
          # the list can't be fetched rather than treating all tags as missing.
          existing=$(gh release list --limit 1000 --json tagName --jq '.[].tagName')
          declare -A HAS_RELEASE=()
          while IFS= read -r r; do [ -n "$r" ] && HAS_RELEASE["$r"]=1; done <<< "$existing"
          echo "Existing releases: ${#HAS_RELEASE[@]} | package tags: $(git tag -l '*@*' | wc -l | tr -d ' ')"
          echo "::endgroup::"

          # name -> dir for packages present at HEAD (source of per-version notes)
          declare -A PKG_DIR=()
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pname=$(node -p "require('./${dir}package.json').name")
            PKG_DIR["$pname"]="$dir"
          done

          # Notes = the '## <version>' section of a CHANGELOG (between two headers).
          version_notes() {
            [ -f "$1" ] || return 1
            awk -v v="## $2" '$0==v{f=1;next} f&&/^## /{exit} f{print}' "$1"
          }
          # True when that version section has a non-dependency bullet.
          version_has_own_changes() {
            version_notes "$1" "$2" | grep -E '^- ' | grep -qvF 'Updated dependencies'
          }

          RELEASES_CREATED=""

          # $1 = deponly|featured — controls GitHub display order. GitHub lists
          # newest-created first, so create dep-bump-only releases first (sink to
          # bottom) and featured ones last (float to top).
          reconcile_pass() {
            local tag version name dir changelog notes pre
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              [ -n "${HAS_RELEASE[$tag]:-}" ] && continue
              version="${tag##*@}"
              name="${tag%@*}"
              dir="${PKG_DIR[$name]:-}"
              if [ -z "$dir" ]; then
                echo "⏭️  $tag — no package dir at HEAD, skipping"
                continue
              fi
              changelog="${dir}CHANGELOG.md"
              if version_has_own_changes "$changelog" "$version"; then
                [ "$1" = "featured" ] || continue
              else
                [ "$1" = "deponly" ] || continue
              fi
              # Late guard against a stale bulk list — never recreate.
              if gh release view "$tag" >/dev/null 2>&1; then
                echo "⏭️  $tag — release exists (late check), skipping"
                continue
              fi
              notes=$(version_notes "$changelog" "$version" || true)
              [ -n "$notes" ] || notes="Release $version"
              pre=""
              case "$version" in *-*) pre="--prerelease" ;; esac
              echo "🏷️  Creating release $tag"
              # --verify-tag: attach to the existing remote tag, never mint a new one.
              gh release create "$tag" --verify-tag --title "$tag" --notes "$notes" $pre
              RELEASES_CREATED="$RELEASES_CREATED $tag"
              echo "✅ Created $tag"
            done < <(git tag -l --sort=creatordate '*@*')
          }

          echo "::group::Pass 1 — dep-bump-only"
          reconcile_pass deponly
          echo "::endgroup::"
          echo "::group::Pass 2 — featured"
          reconcile_pass featured
          echo "::endgroup::"

          if [ -n "$RELEASES_CREATED" ]; then
            echo "RELEASES_CREATED=$RELEASES_CREATED" >> "$GITHUB_ENV"
            echo "✅ Reconciled releases:$RELEASES_CREATED"
          else
            echo "✅ All package tags already have GitHub Releases"
          fi

      - name: Summary
        run: |
          echo "## Changesets Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.changesets_count }}" != "0" ]; then
            echo "✏️ Found ${{ steps.check.outputs.changesets_count }} changeset(s)" >> $GITHUB_STEP_SUMMARY
            echo "📝 Release PR created/updated" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.unpublished.outputs.has_unpublished }}" = "true" ]; then
            echo "📦 Published packages:${{ steps.unpublished.outputs.packages }}" >> $GITHUB_STEP_SUMMARY
            if [ -n "${RELEASES_CREATED:-}" ]; then
              echo "🏷️ Created releases:$RELEASES_CREATED" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ -n "${RELEASES_CREATED:-}" ]; then
            echo "🏷️ Reconciled missing releases:$RELEASES_CREATED" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All packages are up to date" >> $GITHUB_STEP_SUMMARY
          fi
