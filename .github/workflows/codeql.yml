name: CodeQL

on:
  # No workflow-level paths-ignore: `Dependency Review` is a REQUIRED status
  # check (protect-master ruleset), and a workflow skipped at the `on:` level
  # never reports its check → the PR blocks forever on a pending required check.
  # Release PRs (`changeset-release/*`, which only bump versions/changelogs and
  # have nothing to scan) are skipped at the JOB level via head-ref `if:` below
  # — a job skipped by `if:` reports a "skipped" conclusion, which branch
  # protection treats as a pass, so the required check is satisfied without
  # running. This mirrors the head-ref gating already used in danger.yml (#811-
  # era hardening). Dependabot dep PRs change pnpm-lock.yaml too, so they were
  # never matched by the old `**/package.json` ignore anyway — they keep running.
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 3 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # Skip release PRs (no code to analyze); always run on schedule + other PRs.
    # CodeQL stays advisory (not a required check), so a skip here can't block.
    if: github.event_name == 'schedule' || !startsWith(github.head_ref, 'changeset-release/')
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.30.3
        with:
          languages: javascript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3.30.3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.30.3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Required status check (protect-master). Runs on every non-release PR so a
    # dependency change is always scanned; skipped on release PRs via head-ref
    # → "skipped" conclusion → treated as a pass (no deadlock). Not on schedule
    # (no PR diff to review).
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          config-file: ./.github/dependency-review-config.yml
          comment-summary-in-pr: on-failure
          warn-on-openssf-scorecard-level: 0
          # GHSA-wrw7-89jp-8q8g — glib@0.18.5 (VariantStrIter unsoundness, fixed
          #   in 0.20.0). Transitive via Tauri 2 → GTK/WebKit bindings on Linux
          #   only, pulled by the desktop example apps under
          #   examples/desktop/tauri/*/src-tauri/. Not in any published package.
          # GHSA-h67p-54hq-rp68 — js-yaml@3.14.2 (special-char DoS, fixed only in
          #   4.x). Transitive dev-tool dep: @changesets/cli →
          #   @manypkg/get-packages → read-yaml-file@1.1.0 (pinned to js-yaml@^3,
          #   unmaintained). No 3.x patch exists; never parses untrusted YAML.
          allow-ghsas: GHSA-wrw7-89jp-8q8g, GHSA-h67p-54hq-rp68
