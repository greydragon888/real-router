name: CodeQL

on:
  pull_request:
    branches: [master]
    # Skip changesets release PRs entirely — they only bump versions/changelogs.
    paths-ignore:
      - "**/package.json"
      - "**/CHANGELOG.md"
      - ".changeset/**"
  schedule:
    - cron: "0 3 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.30.3
        with:
          languages: javascript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3.30.3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.30.3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          config-file: ./.github/dependency-review-config.yml
          comment-summary-in-pr: on-failure
          warn-on-openssf-scorecard-level: 0
          # GHSA-7mvr-c777-76hp — historical exemption.
          # GHSA-wrw7-89jp-8q8g — glib@0.18.5 (VariantStrIter unsoundness, fixed
          #   in 0.20.0). Transitive via Tauri 2 → GTK/WebKit bindings on Linux
          #   only, pulled by the desktop example apps under
          #   examples/desktop/tauri/*/src-tauri/. Not in any published package.
          allow-ghsas: GHSA-7mvr-c777-76hp, GHSA-wrw7-89jp-8q8g
