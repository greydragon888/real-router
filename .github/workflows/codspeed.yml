name: CodSpeed

# Core hot-path benchmark gate (RFC: .claude/core-benchmark-strategy-rfc-ru.md).
# The local part — the tinybench suite under packages/core/tests/benchmarks/
# wired to @codspeed/tinybench-plugin via fixtures.ts (makeBench → withCodSpeed)
# and a process-per-file runner (run.ts) — already ships on master. This is the
# CI runner that executes that suite under CodSpeed's `simulation` instrument
# (Valgrind callgrind), so each bench emits deterministic instruction counts
# instead of wall-clock.
#
# Auth: real-router is a PUBLIC repo, so CodSpeed runs tokenless — no
# CODSPEED_TOKEN secret is required ("token: only required for private
# repositories"). The one external prerequisite is installing the CodSpeed
# GitHub App on the repo (https://codspeed.io) so the run has a project to
# upload to; until then the action runs but has nowhere to report.
#
# Push-to-master establishes the baseline; pull_request compares against it. The
# regression threshold / gate semantics live in the CodSpeed project settings,
# not here — this workflow only runs the suite under instrumentation and uploads.

# ✅ ENABLED — Phase 2 (2026-07-16). History: the gate was disabled (#984,
# 2026-06-27) because GitHub's heterogeneous `ubuntu-latest` pool landed base
# and head on different CPUs (AMD EPYC vs Intel Xeon), so callgrind emitted
# different instruction counts and every PR red-flagged with phantom
# ±30–4000% swings (root cause:
# https://codspeed.io/blog/unrelated-benchmark-regression). Phase 1 moved the
# job to a dedicated self-hosted VPS (consistent hardware) — but a same-sha
# dispatch pair STILL drifted 3/56 (×5.1 / +82% / +41%): the plugin's
# single-measured-iteration `simulation` mode occasionally drops a full-GC
# tail into the one measured call. Fixed by BATCHING each task to ~4-6 ms of
# operations + a pre-run `settleHeap()` (see packages/core/tests/benchmarks/
# fixtures.ts and IMPLEMENTATION_NOTES "Batched measurements + heap settling");
# verified 0/56 across three same-code run pairs. The installer download from
# codspeed.io is unreachable from the RF VPS, so runner-version is pinned to a
# cargo-git rev (see the action step below).
#
# Phase 2 (this state): push:[master] seeds/updates the baseline, pull_request
# compares against it. The regression threshold / gate semantics live in the
# CodSpeed project settings, not here; CodSpeed is NOT a required status check,
# so a red comparison informs but does not block merges. SECURITY: the job `if`
# gates pull_request to same-repo PRs only — fork-PR code never executes on the
# self-hosted VPS (public-repo RCE / resource-abuse surface).
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manual re-seed / backtest of the CodSpeed baseline.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    name: Core hot-path benchmarks
    # SECURITY (self-hosted + public repo): never run untrusted fork-PR code on
    # the VPS. This gate lets push + workflow_dispatch through unconditionally
    # (they carry no pull_request payload, so the first clause is true), and
    # allows a pull_request ONLY when its head is a branch in THIS repo (a
    # collaborator's branch). A fork PR has head.repo.full_name =
    # "<forker>/real-router" != github.repository, so the job is skipped — fork
    # code never executes on the runner.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    # Self-hosted VPS runner = consistent hardware, which fixes the #984 cause:
    # GitHub's heterogeneous ubuntu-latest pool put base/head on different CPUs
    # (AMD EPYC vs Intel Xeon) → phantom instruction-count swings.
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        # clean: false keeps the persistent runner's gitignored node_modules
        # (and pnpm store) between dispatches — checkout still fetches + resets
        # tracked files to the new sha, only the `git clean -ffdx` is skipped.
        # `pnpm install --frozen-lockfile` in Setup then no-ops instead of
        # re-linking 30 workspace packages, cutting Setup from ~36 s to a few s.
        # Safe here: the suite runs from src via tsx + --conditions=
        # @real-router/internal-source (no vitest, no dist build), so leftover
        # artifacts can't perturb resolution or the callgrind counts.
        with:
          clean: false

      - name: Setup
        uses: ./.github/actions/setup
        # node-cache: "" skips setup-node's pnpm-store cache restore — on this
        # persistent runner the store + node_modules already live on local disk
        # (see clean:false above), and the restore re-downloads a ~200 MB
        # tarball from GitHub's cache backend every run (~20 s) just to unpack
        # it over an identical local store.
        with:
          node-cache: ""

      # runner-version: rev:… installs codspeed-runner via `cargo install` into
      # ~/.cargo/bin. Actions runs each step in a non-login, non-interactive
      # shell (`bash --noprofile --norc`), which does NOT read the ~/.profile
      # line rustup adds — so ~/.cargo/bin is off PATH, and the action's runner
      # invocation dies with `codspeed: command not found` (exit 127) even
      # though the install succeeded. Persist the dir on PATH for every later
      # step (incl. the action's internal run step) via $GITHUB_PATH. The
      # release/curl path installs onto PATH itself and would not need this;
      # it is specific to the cargo-install path we switched to.
      - name: Put cargo bin dir on PATH (for cargo-installed codspeed-runner)
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # CodSpeed injects its required V8 flags (--allow-natives-syntax, --no-opt,
      # …) ONLY into the process it wraps directly, and those flags can't ride
      # through NODE_OPTIONS. So we wrap a DIRECT `node` that runs the whole suite
      # in ONE process (tests/benchmarks/codspeed.ts imports every *.bench.ts and
      # awaits them serially) — NOT `pnpm bench`, whose pnpm → tsx → spawn-per-file
      # hops strip the flags and crash @codspeed/core on its `%` native. Local
      # `pnpm bench` keeps process-per-file (run.ts) for wall-clock dev.
      #
      # working-directory: packages/core so `tsx` and @real-router/* resolve from
      # the package; --conditions maps @real-router/* to live `src/` (no build).
      #
      # `mode` is a REQUIRED input on the v4 action (no default) — omitting it
      # fails the run before any bench executes. `simulation` is the
      # deterministic instruction-count instrument (vs `walltime`, which needs
      # dedicated runners).
      #
      # runner-version: `rev:v4.18.4` forces the action's cargo-install branch
      # (`source $HOME/.cargo/env; cargo install --locked --git
      # https://github.com/CodSpeedHQ/codspeed --rev v4.18.4 codspeed-runner`)
      # INSTEAD of its default release path, which curls the installer from
      # `https://codspeed.io/v4.18.4/install.sh`. That host is intermittently
      # unreachable from the RF-hosted self-hosted VPS — ~50% of dispatches died
      # with `curl: (28) SSL connection timeout` after 300 s, before any bench
      # ran. The cargo path fetches from github.com + crates.io only (no
      # codspeed.io). v4.18.4 pins the SAME runner the release path used, so
      # measurement is unchanged. PREREQUISITE (VPS-side, one-time): rustup/cargo
      # must be installed for the `gh-runner` user — the action does
      # `source $HOME/.cargo/env`; without it the step fails fast. On the
      # PERSISTENT runner cargo compiles once (~2-3 min, needs crates.io) then
      # reports "already installed" and skips on every later dispatch (no
      # network), so the flake is retired after the first green run. Bump this
      # rev in lockstep with any CodSpeedHQ/action major upgrade.
      - name: Run core hot-path benchmarks under CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          runner-version: rev:v4.18.4
          working-directory: packages/core
          run: node --conditions=@real-router/internal-source --import tsx tests/benchmarks/codspeed.ts
