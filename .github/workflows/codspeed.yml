name: CodSpeed

# Core hot-path benchmark gate (RFC: .claude/core-benchmark-strategy-rfc-ru.md).
# The local part — the tinybench suite under packages/core/tests/benchmarks/
# wired to @codspeed/tinybench-plugin via fixtures.ts (makeBench → withCodSpeed)
# and a process-per-file runner (run.ts) — already ships on master. This is the
# CI runner that executes that suite under CodSpeed's `simulation` instrument
# (Valgrind callgrind), so each bench emits deterministic instruction counts
# instead of wall-clock.
#
# Auth: real-router is a PUBLIC repo, so CodSpeed runs tokenless — no
# CODSPEED_TOKEN secret is required ("token: only required for private
# repositories"). The one external prerequisite is installing the CodSpeed
# GitHub App on the repo (https://codspeed.io) so the run has a project to
# upload to; until then the action runs but has nowhere to report.
#
# Push-to-master establishes the baseline; pull_request compares against it. The
# regression threshold / gate semantics live in the CodSpeed project settings,
# not here — this workflow only runs the suite under instrumentation and uploads.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Lets CodSpeed trigger a backtest run to seed the initial baseline data.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    name: Core hot-path benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup
        uses: ./.github/actions/setup

      # CodSpeed injects its required V8 flags (--allow-natives-syntax, --no-opt,
      # …) ONLY into the process it wraps directly, and those flags can't ride
      # through NODE_OPTIONS. So we wrap a DIRECT `node` that runs the whole suite
      # in ONE process (tests/benchmarks/codspeed.ts imports every *.bench.ts and
      # awaits them serially) — NOT `pnpm bench`, whose pnpm → tsx → spawn-per-file
      # hops strip the flags and crash @codspeed/core on its `%` native. Local
      # `pnpm bench` keeps process-per-file (run.ts) for wall-clock dev.
      #
      # working-directory: packages/core so `tsx` and @real-router/* resolve from
      # the package; --conditions maps @real-router/* to live `src/` (no build).
      #
      # `mode` is a REQUIRED input on the v4 action (no default) — omitting it
      # fails the run before any bench executes. `simulation` is the
      # deterministic instruction-count instrument (vs `walltime`, which needs
      # dedicated runners).
      - name: Run core hot-path benchmarks under CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          working-directory: packages/core
          run: node --conditions=@real-router/internal-source --import tsx tests/benchmarks/codspeed.ts
