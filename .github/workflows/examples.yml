name: Examples

on:
  schedule:
    - cron: '0 22 * * 0,3' # Mon & Thu at 05:00 ICT (UTC+7)
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; the `notify-failure` job declares its own
# `issues: write`, which overrides this. No-op today (repo default is `read`) —
# insurance against a future flip of default_workflow_permissions.
permissions:
  contents: read

# Self-hosted ducktors/turborepo-remote-cache on Cloud Run + Cloudflare R2 (#490)
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  examples:
    name: Build & Test Examples
    # Build-only job on the self-hosted VPS runner. examples.yml triggers on
    # schedule + workflow_dispatch ONLY (no fork-PR) → no self-hosted RCE surface.
    # E2E + notify-failure stay on ubuntu-latest: E2E's Playwright/Electron
    # downloads need a one-time VPS pre-install (RU-network DPI), and notify must
    # run even if the VPS is offline.
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # turbo dependency chain: build → ^bundle (the @real-router libs each
      # example depends on, transitively down to core) + the example's own
      # test/lint/type-check. The ^bundle edge makes this job self-sufficient
      # from a clean runner — examples resolve @real-router/* via package
      # exports → dist/ (consumer-style tsconfigs, no internal-source), so
      # without it the job only worked off self-hosted runner residue /
      # remote-cache leftovers (#499 was this exact class).
      - name: Build (includes lib bundles + lint, type-check, test via turbo deps)
        run: pnpm turbo run build --filter='./examples/**'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [examples]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter react-combined-example exec playwright install chromium --with-deps

      # Persist the downloaded Electron zip across runs (~128 MB), keyed by the
      # electron examples' manifests — the only place the electron version is
      # pinned — so only an electron bump rotates the key. (Keying by
      # pnpm-lock.yaml minted a new immutable ~128 MB cache entry on every
      # lockfile change — weekly dependabot churn that pressures the 10 GB LRU
      # quota shared with the pnpm store cache.) The installer self-heals on a
      # stale/corrupt cache (checksum re-verify → re-download) and prunes zips
      # of other versions restored via restore-keys.
      - name: Cache Electron binary
        uses: actions/cache@v6
        with:
          path: ~/.cache/electron-zip
          key: electron-zip-${{ runner.os }}-${{ hashFiles('examples/desktop/electron/*/package.json') }}
          restore-keys: electron-zip-${{ runner.os }}-

      # The desktop/electron/* examples launch the real Electron binary via
      # Playwright's `_electron.launch`, which reads `node_modules/electron/path.txt`.
      # pnpm 10 records a "built" flag in the cached store, so on a warm-store
      # runner it skips electron's postinstall, leaving `path.txt` absent. Both
      # `node install.js` and a Node wrapper around @electron/get exit 0 *at the
      # await* on this runner (the download never keeps the event loop alive),
      # writing no path.txt and bypassing any guard (#812). This script downloads
      # the release zip with curl (a blocking subprocess), verifies sha256, and
      # extracts — no Node async — so the step cannot go green without a binary.
      - name: Install Electron binary
        run: bash scripts/ci-install-electron.sh

      # Build results cached from examples job via Turbo Remote Cache.
      # --continue=dependencies-successful: a failing example's e2e must not
      # cancel the others — run every example's specs, so one CI run yields the
      # complete list of failing e2e tests instead of stopping at the first.
      #
      # xvfb-run: the desktop/electron/* examples launch a real Electron (a GUI
      # app) via `_electron.launch`. The runner is headless, so without a virtual
      # display Electron dies on platform init ("Missing X server or $DISPLAY" →
      # SIGSEGV). Xvfb is preinstalled on ubuntu-latest; depth 24 (Chromium
      # dislikes the 8-bit default). Web examples run headless Chromium and ignore
      # the display. (#812)
      - name: Run E2E tests
        run: >-
          xvfb-run -a --server-args="-screen 0 1280x1024x24"
          pnpm turbo run test:e2e --filter='./examples/**' --concurrency=1 --continue=dependencies-successful

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          # Examples nest 3-4 levels deep (examples/web/<fw>/<name>/,
          # examples/desktop/electron/<name>/) — a single-level glob matched
          # nothing, so reports were never uploaded on failure (#812).
          path: |
            examples/**/playwright-report/
            examples/**/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # Open/refresh a tracking issue when the scheduled suite fails, so chronic
  # redness can't live unnoticed (the only other signal is an email to the
  # workflow-file author). Skipped on workflow_dispatch to avoid noise during
  # manual verification runs (#812).
  notify-failure:
    name: Open issue on failure
    runs-on: ubuntu-latest
    needs: [examples, e2e]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- examples-failure-tracker -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = '🔴 Examples workflow failing';
            const body = [
              marker,
              `The scheduled **Examples** workflow failed.`,
              '',
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              '',
              '_Auto-filed by `examples.yml`. This comment updates on each subsequent failure; close the issue once green._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'area: ci/cd',
              per_page: 100,
            });
            const existing = issues.find(i => (i.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'area: ci/cd'],
              });
            }
