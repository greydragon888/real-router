name: Examples

on:
  schedule:
    - cron: '0 22 * * 0,3' # Mon & Thu at 05:00 ICT (UTC+7)
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Self-hosted ducktors/turborepo-remote-cache on Cloud Run + Cloudflare R2 (#490)
env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  examples:
    name: Build & Test Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # turbo dependency chain: build → test → lint, type-check
      # Single command runs the full validation pipeline
      - name: Build (includes lint, type-check, test via turbo deps)
        run: pnpm turbo run build --filter='./examples/**'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [examples]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter react-combined-example exec playwright install chromium --with-deps

      # Persist the downloaded Electron zip across runs. `cache: pnpm` only
      # caches the pnpm store, NOT ~/.cache/electron (where @electron/get keeps
      # the downloaded artifact), so without this every run re-downloads ~110 MB.
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: electron-${{ runner.os }}-

      # The desktop/electron/* examples launch the real Electron binary via
      # Playwright's `_electron.launch`, which reads `node_modules/electron/path.txt`.
      # pnpm 10 records a "built" flag in the cached store, so on a warm-store
      # runner it skips electron's postinstall, leaving `path.txt` absent. The
      # previous fix (`node install.js`) inherited install.js's un-awaited
      # download: the process could exit 0 before `path.txt` was written, so
      # `electron.launch` still failed with `ENOENT … path.txt` (#812). This
      # wrapper awaits the full download→extract→write and asserts the
      # postcondition. All three electron examples share one .pnpm/electron@X,
      # so installing via one example materialises the binary for all.
      - name: Install Electron binary
        run: pnpm --filter electron-react-example exec node "$GITHUB_WORKSPACE/scripts/ci-install-electron.cjs"

      # Build results cached from examples job via Turbo Remote Cache.
      # --continue=dependencies-successful: a failing example's e2e must not
      # cancel the others — run every example's specs, so one CI run yields the
      # complete list of failing e2e tests instead of stopping at the first.
      - name: Run E2E tests
        run: pnpm turbo run test:e2e --filter='./examples/**' --concurrency=1 --continue=dependencies-successful

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          # Examples nest 3-4 levels deep (examples/web/<fw>/<name>/,
          # examples/desktop/electron/<name>/) — a single-level glob matched
          # nothing, so reports were never uploaded on failure (#812).
          path: |
            examples/**/playwright-report/
            examples/**/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # Open/refresh a tracking issue when the scheduled suite fails, so chronic
  # redness can't live unnoticed (the only other signal is an email to the
  # workflow-file author). Skipped on workflow_dispatch to avoid noise during
  # manual verification runs (#812).
  notify-failure:
    name: Open issue on failure
    runs-on: ubuntu-latest
    needs: [examples, e2e]
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Create or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- examples-failure-tracker -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = '🔴 Examples workflow failing';
            const body = [
              marker,
              `The scheduled **Examples** workflow failed.`,
              '',
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              '',
              '_Auto-filed by `examples.yml`. This comment updates on each subsequent failure; close the issue once green._',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'area: ci/cd',
              per_page: 100,
            });
            const existing = issues.find(i => (i.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing — ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'area: ci/cd'],
              });
            }
