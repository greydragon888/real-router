name: CodSpeed Adapters

# Adapter hot-path benchmark suite (react/preact/vue/solid/svelte/angular) —
# pure tinybench + vite prebuild under jsdom; design record in
# IMPLEMENTATION_NOTES ("Adapter benches — all six frameworks") and
# benchmarks/adapter-bench/.
#
# ✅ ENABLED — Phase 2 (2026-07-16). Phase 1 (dispatch-only) verified the
# suite the same way the core gate was verified (#984): first-callgrind K
# calibration (three convergence iterations; solid/navigate-param-swap needed
# the core-task-#1 double-mass medicine) → final same-sha pair 18/18
# unchanged, impact +0.014%. push:[master] seeds/updates the baseline,
# pull_request compares; CodSpeed is NOT a required status check. Kept
# SEPARATE from codspeed.yml so an adapter-suite failure never blocks the
# core gate signal (and vice versa); the single runner queues the two jobs.
#
# The prebuild step runs OUTSIDE the CodSpeed action on purpose: vite build
# must not be instrumented — only the bench process is. The bench itself is a
# single direct `node` (no vitest, no spawn hops), the exact process shape
# whose V8-flag injection the core gate already proved on this runner.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manual re-seed / backtest of the CodSpeed baseline.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    name: Adapter hot-path benchmarks (6 frameworks)
    # SECURITY (self-hosted + public repo): same gate as codspeed.yml — push
    # + workflow_dispatch run unconditionally (no pull_request payload, first
    # clause true); a pull_request runs ONLY when its head is a branch in
    # THIS repo. Fork PRs are skipped, so untrusted fork code never executes
    # on the VPS.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    # Same self-hosted VPS as the core gate: consistent hardware; runner
    # processes one job at a time, so core/adapters runs queue, never race.
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        # Same persistent-runner reuse as codspeed.yml: keep gitignored
        # node_modules between runs (the PoC's own dist/ is regenerated by
        # the prebuild step below — emptyOutDir: true).
        with:
          clean: false

      - name: Setup
        uses: ./.github/actions/setup
        # Skip the ~200 MB pnpm-store cache round-trip — store + node_modules
        # live on this runner's local disk (see codspeed.yml for the numbers).
        with:
          node-cache: ""

      # codspeed-runner is cargo-installed (rev pin below); ~/.cargo/bin is
      # not on Actions' non-login-shell PATH — same fix as codspeed.yml.
      - name: Put cargo bin dir on PATH (for cargo-installed codspeed-runner)
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Prebuild the bench apps (vite ×6, production, NOT instrumented)
        working-directory: benchmarks
        # via the workspace script (not `pnpm exec vite`) so knip resolves the
        # vite binary against benchmarks/package.json, where it is declared.
        # The script also bundles the angular graph first (turbo): the angular
        # suite resolves @real-router/* to built dist — see vite/base.mts.
        run: pnpm run prebuild:adapter

      # runner-version: rev:… = cargo-install path (github.com + crates.io
      # only; codspeed.io is unreachable from this VPS ~50% of the time).
      # cargo self-caches the rev, so this is zero-network after the first
      # compile the core gate already paid. Keep the rev in lockstep with
      # codspeed.yml.
      - name: Run adapter benchmarks under CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          runner-version: rev:v4.18.4
          working-directory: benchmarks
          run: node --import tsx adapter-bench/codspeed.mts
