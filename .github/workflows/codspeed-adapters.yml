name: CodSpeed Adapters

# Adapter hot-path benchmark suite (PoC: react) — pure tinybench + vite
# prebuild under jsdom; design record in IMPLEMENTATION_NOTES ("CodSpeed
# benchmark gate") and benchmarks/adapter-bench-poc/.
#
# PHASE 1: workflow_dispatch-ONLY while the callgrind numbers are verified
# (same staging the core gate used — see #984): dispatch → K recalibration
# from the first honest run → same-sha pair with 0 phantoms → only then
# consider auto triggers. Kept SEPARATE from codspeed.yml so an adapter-suite
# failure never blocks the core gate signal (and vice versa).
#
# The prebuild step runs OUTSIDE the CodSpeed action on purpose: vite build
# must not be instrumented — only the bench process is. The bench itself is a
# single direct `node` (no vitest, no spawn hops), the exact process shape
# whose V8-flag injection the core gate already proved on this runner.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmarks:
    name: React adapter hot-path benchmarks (PoC)
    # Same self-hosted VPS as the core gate: consistent hardware; runner
    # processes one job at a time, so core/adapters runs queue, never race.
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        # Same persistent-runner reuse as codspeed.yml: keep gitignored
        # node_modules between runs (the PoC's own dist/ is regenerated by
        # the prebuild step below — emptyOutDir: true).
        with:
          clean: false

      - name: Setup
        uses: ./.github/actions/setup
        # Skip the ~200 MB pnpm-store cache round-trip — store + node_modules
        # live on this runner's local disk (see codspeed.yml for the numbers).
        with:
          node-cache: ""

      # codspeed-runner is cargo-installed (rev pin below); ~/.cargo/bin is
      # not on Actions' non-login-shell PATH — same fix as codspeed.yml.
      - name: Put cargo bin dir on PATH (for cargo-installed codspeed-runner)
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Prebuild the bench app (vite, production, NOT instrumented)
        working-directory: benchmarks
        # via the workspace script (not `pnpm exec vite`) so knip resolves the
        # vite binary against benchmarks/package.json, where it is declared.
        run: pnpm run prebuild:adapter-poc

      # runner-version: rev:… = cargo-install path (github.com + crates.io
      # only; codspeed.io is unreachable from this VPS ~50% of the time).
      # cargo self-caches the rev, so this is zero-network after the first
      # compile the core gate already paid. Keep the rev in lockstep with
      # codspeed.yml.
      - name: Run adapter benchmarks under CodSpeed
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          runner-version: rev:v4.18.4
          working-directory: benchmarks
          run: node --import tsx adapter-bench-poc/react.bench.mts
