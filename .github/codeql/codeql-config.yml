name: "CodeQL Config"

# Paths to exclude from CodeQL analysis
paths-ignore:
  # Test sources may contain intentional security anti-patterns / extreme
  # inputs (unit, property, stress, bench). Convention: everything under a
  # `tests/` folder, plus these suffixes anywhere — both `.ts` and `.tsx`.
  - "**/tests/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.properties.ts"
  - "**/*.properties.tsx"
  - "**/*.stress.ts"
  - "**/*.stress.tsx"
  - "**/*.bench.ts"
  - "**/*.bench.tsx"

  # Benchmark harness sources (intentional edge cases and extreme inputs)
  - "**/benchmarks/**"

  # Build artifacts and dependencies
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.stryker-tmp/**"

  # Documentation and config
  - "**/*.md"
  - "**/*.json"

# Paths to include (optional - by default all non-excluded paths are included)
paths:
  - "packages/*/src/**"
  - "packages/*/index.ts"

# Queries to run
queries:
  - uses: security-extended
  - uses: security-and-quality
