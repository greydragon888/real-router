# Codecov Configuration
# Docs: https://docs.codecov.com/docs/codecovyml-reference

# Basic Settings
codecov:
  require_ci_to_pass: yes # Wait for CI to pass before reporting
  notify:
    wait_for_ci: yes # Wait for all CI checks before notifications
    after_n_builds: 1 # Process after receiving all uploads

# Coverage Configuration
coverage:
  precision: 2 # Decimal places for coverage percentage
  round: down # Round down for conservative estimates
  range: "90...100" # Green status range (strict)

  # Coverage Status Checks
  status:
    project:
      default:
        target: 100% # Project must maintain 100% coverage
        threshold: 1% # Allow 1% drop without failing
        if_ci_failed: error # Fail if CI failed
        informational: false # Block on failure
        only_pulls: false # Run on all commits

    patch:
      default:
        target: 100% # New code must have 100% coverage
        threshold: 1% # Allow 1% variance
        if_ci_failed: error
        informational: false
        only_pulls: true # Only for pull requests

    changes:
      default:
        if_ci_failed: error
        informational: false
        only_pulls: true

# Pull Request Comments Configuration
comment:
  layout: "header, diff, changes, suggestions, tree, footer"
  behavior: default # Update existing comment
  require_changes: false # Always show comment
  require_base: false # Don't require base commit
  require_head: true # Require head commit
  require_bundle_changes: true # Only comment when bundle size changes
  bundle_change_threshold: 1Kb # Warn on 1KB+ increase

# Ignore paths (no coverage tracking)
ignore:
  - "**/tests/**" # Test files
  - "**/*.test.ts" # Unit tests
  - "**/*.test.tsx" # React tests
  - "**/*.spec.ts" # Spec tests
  - "**/*.spec.tsx" # React spec tests
  - "**/*.bench.ts" # Benchmark files
  - "**/dist/**" # Built files
  - "**/coverage/**" # Coverage reports
  - "**/*.config.ts" # Config files
  - "**/*.config.mts" # Config files
  - "**/*.config.mjs" # Config files
  - "**/*.config.js" # Config files
  - ".github/**" # GitHub workflows
  - "docs/**" # Documentation
  - "**/types.ts" # Type definitions
  - "**/constants.ts" # Constants
  - "**/index.ts" # Re-exports
  - "**/__mocks__/**" # Mocks
  - "**/__fixtures__/**" # Fixtures

# Per-package coverage breakdown — Components, NOT flags (#732).
# Codecov flags only exist if every upload is tagged with them (`flags:`/-F at
# upload time); our CI does a single untagged upload of all lcov files, so a
# `flags:` section here would be inert (no per-flag reports → carryforward has
# nothing to act on). Components are sliced server-side from `paths:`, so they
# work with the single untagged upload as-is.
# Complete + auto-checked by scripts/check-coverage-scope.mjs.
component_management:
  individual_components:
    - component_id: angular
      paths:
        - packages/angular/src/**
    # browser-env / dom-utils are shared-source owners (#809): their src is a
    # symlink, so their coverage lands at the shared/<dir> realpath (CI
    # normalizes the lcov SF paths to repo-root-relative shared/<dir>/…).
    - component_id: browser-env
      paths:
        - shared/browser-env/**
    - component_id: browser-plugin
      paths:
        - packages/browser-plugin/src/**
    - component_id: core
      paths:
        - packages/core/src/**
    - component_id: dom-utils
      paths:
        - shared/dom-utils/**
    - component_id: fsm
      paths:
        - packages/fsm/src/**
    - component_id: hash-plugin
      paths:
        - packages/hash-plugin/src/**
    - component_id: lifecycle-plugin
      paths:
        - packages/lifecycle-plugin/src/**
    - component_id: logger
      paths:
        - packages/logger/src/**
    - component_id: logger-plugin
      paths:
        - packages/logger-plugin/src/**
    - component_id: memory-plugin
      paths:
        - packages/memory-plugin/src/**
    - component_id: navigation-plugin
      paths:
        - packages/navigation-plugin/src/**
    - component_id: persistent-params-plugin
      paths:
        - packages/persistent-params-plugin/src/**
    - component_id: preact
      paths:
        - packages/preact/src/**
    - component_id: preload-plugin
      paths:
        - packages/preload-plugin/src/**
    - component_id: react
      paths:
        - packages/react/src/**
    - component_id: engine
      paths:
        - packages/engine/src/**
    - component_id: route-utils
      paths:
        - packages/route-utils/src/**
    - component_id: rsc-server-plugin
      paths:
        - packages/rsc-server-plugin/src/**
    - component_id: rx
      paths:
        - packages/rx/src/**
    - component_id: search-schema-plugin
      paths:
        - packages/search-schema-plugin/src/**
    - component_id: solid
      paths:
        - packages/solid/src/**
    - component_id: sources
      paths:
        - packages/sources/src/**
    # ssr-data-plugin is also the coverage owner of shared/ssr (#809) — no
    # dedicated owner package exists, so the shared sources ride its component.
    - component_id: ssr-data-plugin
      paths:
        - packages/ssr-data-plugin/src/**
        - shared/ssr/**
    - component_id: svelte
      paths:
        - packages/svelte/src/**
    - component_id: type-guards
      paths:
        - packages/type-guards/src/**
    - component_id: validation-plugin
      paths:
        - packages/validation-plugin/src/**
    - component_id: vue
      paths:
        - packages/vue/src/**

# GitHub Checks Integration
github_checks:
  annotations: true # Show inline annotations on GitHub

# Parser configuration for JavaScript/TypeScript
parsers:
  javascript:
    enable_partials: true # Track partial coverage

# Bundle Analysis Configuration
# Docs: https://docs.codecov.com/docs/javascript-bundle-analysis
bundle_analysis:
  warning_threshold: "5%" # Warn if bundle increases by 5%
  status: "informational" # Don't block PRs, just inform
